source: Ironsworn
assets:
- category: Companion
  name: Cave Lion
  requirement: Your cat takes down its prey.
  abilities:
  - When your cat chases down big game, you may Resupply with +edge (instead of +wits). If you do, take +1 supply or +1 momentum
    on a strong hit.
  - When you Enter the Fray or Strike by sending your cat to attack, roll +edge. On a hit, take +2 momentum.
  - When you Make Camp, your cat is alert to trouble. If you or an ally choose to relax, take +1 spirit. If you focus, take
    +1 momentum.
- category: Companion
  name: Giant Spider
  requirement: Your spider uncovers secrets.
  abilities:
  - When you Secure an Advantage by sending your spider to scout a place, add +1 and take +1 momentum on a hit.
  - You may Face Danger +shadow by sending your spider to secretly study someone. On a hit, the spider returns to reveal the
    target's deepest fears through a reflection in its glassy eyes. Use this to Gather Information and reroll any dice.
  - When your spider sets a trap, add +1 as you Enter the Fray +shadow. On a strong hit, also inflict 2 harm.
- category: Companion
  name: Hawk
  requirement: Your hawk can aid you while it is aloft.
  abilities:
  - When you Undertake a Journey, or when you Resupply by hunting for small game, add +1.
  - When you Secure an Advantage +edge using your hawk to harass and distract your foes, add +1 and take +1 momentum on a
    hit.
  - When you Face Danger +wits to detect an approaching threat, or when you Enter the Fray +wits against an ambush, add +2.
- category: Companion
  name: Horse
  requirement: You and your horse ride as one.
  abilities:
  - When you Face Danger +edge using your horse's speed and grace, or when you Undertake a Journey, add +1.
  - When you Enter the Fray or Secure an Advantage +heart by charging into combat, add +1 and take +1 momentum on a hit.
  - When you Strike or Clash at close range while mounted, add +1 and inflict +1 harm on a hit.
- category: Companion
  name: Hound
  requirement: Your hound is your steadfast companion.
  abilities:
  - When you Gather Information using your hound's keen senses to track your quarry or investigate a scene, add +1 and take
    +1 momentum on a hit.
  - When you Strike or Clash alongside your hound and score a hit, inflict +1 harm or take +1 momentum.
  - When you Endure Stress in the company of your hound, add +1.
- category: Companion
  name: Kindred
  requirement: Your friend stands by you.
  abilities:
  - When you make a move outside of combat aided by your companion's expertise, add +1.
  - When you Clash or Battle alongside your companion, or when you Face Danger against an attack by standing together, add
    +1.
  - Once you mark a bond with your companion, add +1 when you Face Desolation in their presence.
- category: Companion
  name: Mammoth
  requirement: Your mammoth walks a resolute path.
  abilities:
  - When your mammoth travels with you as you Undertake a Journey, you may add +2 but suffer -1 momentum (decide before rolling).
  - When you make a move which requires you to roll +supply, you may instead roll +your mammoth's health.
  - When you Strike or Clash by riding your mammoth against a pack of foes, add +1 and inflict +1 harm on a hit.
- category: Companion
  name: Owl
  requirement: Your owl soars through the darkness.
  abilities:
  - If you Resupply at night by sending your owl to hunt, take +2 momentum on a hit. When you Enter the Fray +wits against
    an ambush in darkness, add +1 and take +1 momentum on a hit.
  - When you leverage your owl's secret knowledge to perform a ritual, add +1 or take +1 momentum on a hit (decide before
    rolling).
  - When you Face Death, take your owl's health as +momentum before you roll.
- category: Companion
  name: Raven
  requirement: Your raven heeds your call.
  abilities:
  - When you Secure an Advantage or Face Danger +shadow using your raven to perform trickery (such as creating a distraction
    or stealing a small object) add +1 and take +1 momentum on a hit.
  - When you Face Death, add +2 and take +1 momentum on a hit.
  - When your raven carries messages for you, you may Secure an Advantage, Gather Information, or Compel from a distance.
- category: Companion
  name: Young Wyvern
  requirement: Your wyvern won't devour you. For now.
  abilities:
  - When you Undertake a Journey and score a hit, you may suffer -1 supply in exchange for +2 momentum.
  - When you make the Companion Endure Harm move for your wyvern, add +2 and take +1 momentum on a hit.
  - When you Strike by commanding your wyvern to attack, roll +heart. Your wyvern inflicts 3 harm on a hit.
