- category: Sample Factions
  name: Societies
  id: sundered_isles/oracles/factions/sample_factions/societies
  rows:
  - {min: 1, max: 10, text: "Akiya: Coalition of clans known for their sleek and speedy ships. They gather each year to celebrate the ebb of the storm season, and hang rows of vibrantly colored flags from their ship's rigging to honor the dead."}
  - {min: 11, max: 20, text: "Arsu / Azizos: Once a single tribe, the loyalty of these people is divided between two rulers descended from rival heirs. They often war against one another, but now have a fragile alliance against a mutual foe."}
  - {min: 21, max: 30, text: "Kai: Seagoing folk who build their homes and ships from luminous glimmerwood. This resource is harvested from the coastal swamps of their homeland, an environment under threat of destruction."}
  - {min: 31, max: 40, text: "Khazeera: Warring people who inhabit an enduring city-state at the edge of an active volcano. Molten rock and slag from this sacred volcano is used in the heated shot for their destructive cannonry, and their soldiers wield blades forged in its fires."}
  - {min: 41, max: 50, text: "Morien: Seafolk who forsake cannons and muskets. They sail low-profile catamarans and set upon their foes with stealthy ambushes."}
  - {min: 51, max: 60, text: "Otani: People who dwell in island highlands. They largely forsake the sea, but send out seafaring envoys to build ties with other communities."}
  - {min: 61, max: 70, text: "Sularia: Beast-bonded people who commune with magnificent elder rays. They are sworn to protect the seas from hunters and despoilers."}
  - {min: 71, max: 80, text: "Talan: Scrappy seafolk who range far among the islands. They maintain a floating trade settlement open to any who visit with shuttered gunports."}
  - {min: 81, max: 90, text: "Thalassa: Recent refugees of a cataclysmic war. They are desperate to gain allies against the enemy they believe will follow them to the isles."}
  - {min: 91, max: 100, text: "Uktanu: Reclusive people who trace their lineage to the first inhabitants of the isles. They are sworn to protect the sacred sites and relics of their ancient forebears."}
- category: Sample Factions
  name: Organizations
  id: sundered_isles/oracles/factions/sample_factions/organizations
  rows:
  - {min: 1, max: 10, text: "Bloody Skulls: Bands of scavenging shipbreakers who lie in wait along hazardous passages. They believe that painting their faces with a death-like visage will protect against retribution by spirits of the dead."}
  - {min: 11, max: 20, text: "Cynosure League: Guild of scientists and naturalists who record their findings in exhaustively-detailed journals. Their works are copied and recorded by archivists at a grand central library."}
  - {min: 21, max: 30, text: "Ebb Tide: Covert insurgency of spies and saboteurs. They seek to cripple imperial ambitions from within, and use trained gulls to carry vital messages to collaborators."}
  - {min: 31, max: 40, text: "Faceless Accord: Renegades sailing in defiance of imperial powers. They conceal their identities behind iron masks to protect kinfolk still under imperial rule"}
  - {min: 41, max: 50, text: "Forsaken Fleet: Powerful clan of pirates led by a marauder known as the Raven Queen. They recently sacked and seized a major port town and made it a refuge for outlaws and outcasts"}
  - {min: 51, max: 60, text: "Ironmongers: Guild of shipbuilders and arms manufacturers who supply their destructive wares to the highest bidder. They secretly incite wars to expand their fortune."}
  - {min: 61, max: 70, text: "Moonsingers: Mystic coven that draw their powers from the dance of the moons and the rhythm of the tides. They recruit and train talented initiates from across the isles."}
  - {min: 71, max: 80, text: "Saltblood: Mariners bound to an age-old seafaring fellowship. They recognize fellow saltbloods and communicate using complex hand signals."}
  - {min: 81, max: 90, text: "Tide Runners: Smugglers who ferry their ill-gotten goods from island to island. They rely on speed, stealth, and the cover of foul weather or moonless nights."}
  - {min: 91, max: 100, text: "Wayfarers: Peddlers who range across the isles and beyond. They transport rare and unusual cargo aboard their vibrantly painted ships."}
- category: Sample Factions
  name: Empires
  id: sundered_isles/oracles/factions/sample_factions/empires
  rows:
  - {min: 1, max: 10, text: "Argosy Company: Trade company which commands a fleet of beast-hunting ships and pays bounties on beasts to independent captains. Their unscrupulous merchants deal in trophies and resources gathered from slain creatures."}
  - {min: 11, max: 20, text: "Eldarian Remnants: Loyalists of a fallen empire who seek to rebuild their former glory among the isles, guided by a charismatic and shrewd military leader. The sails of their ships are emblazoned with a burning phoenix."}
  - {min: 21, max: 30, text: "Empire of Solas: Age-old dominion ruled by an immortal god-emperor. Their ostentatious ships are adorned with gold metalwork and filigreed sails."}
  - {min: 31, max: 40, text: "Firgovian Regency: Fracturing empire facing a succession crisis in the aftermath of the monarch's assassination. Rival claimants gather their armies and navies to take the crown by force."}
  - {min: 41, max: 50, text: "Hand of Theya: Iron-fisted theocracy under the rule of a council of priests. Their mandates are enforced by red-robed inquisitors."}
  - {min: 51, max: 60, text: "Kyrody Dominion: Expansive empire with far-flung territories. Their holdings within the isles are overseen by corrupt and squabbling governors, each vying for greater power and wealth."}
  - {min: 61, max: 70, text: "Meridian Company: Powerful trade company with diverse holdings and boundless political influence. They function as a shadow government behind other powers."}
  - {min: 71, max: 80, text: "Norish Empire: War-mongering clans newly united under a powerful warlord. Their warships are fitted with imposing rams and heavy boarding ramps."}
  - {min: 81, max: 90, text: "Skulde Alliance: Ambitious empire which wields a powerful military. At the vanguard of their fleets are the dragon-riders of the Crimson Guard, who house their steeds and launch their attacks from colossal carrier ships."}
  - {min: 91, max: 100, text: "Sovereign States: Industrialist power formed from the remnants of warring nations. They are governed by an oligarchical council whose members scheme and backstab to advance their own interests."}
- category: Sample Factions
  name: The Cursed
  id: sundered_isles/oracles/factions/sample_factions/cursed
  rows:
  - {min: 1, max: 10, text: "Acheron's Armada: Ghost ships under the command of an undead imperial admiral. This vengeful wraith seeks to carry on the war that cost them their life."}
  - {min: 11, max: 20, text: "Blighthulk: Titanic ship cursed with incessant corrosion and rot. Its crew must constantly add wood, sails, and fittings from salvaged wrecks and defeated foes into this massive and unnerving chimera-craft."}
  - {min: 21, max: 30, text: "Bloodmarked League: An order of occultists, each bearing a blood-red tattoo on their wrist, who are dedicated to hunting and banishing the restless dead."}
  - {min: 31, max: 40, text: "Brineblessed: Cult of sailors cursed by a drowned god. Their bodies and ships are corrupted by horrible aspects of the sea—riddled with barnacles, rotting sea weed, and brackish slime."}
  - {min: 41, max: 50, text: "Carrion Fleet: Fleet under the command of a necromancer. The dreadful ships are festooned with bones and bloodied sails, crewed by skeletal undead, and escorted by the risen corpse of a slain behemoth."}
  - {min: 51, max: 60, text: "Fireships: Ships burning with unquenchable fire and crewed by bone-scorched undead. The flagship was set aflame by marauders in a port attack, and its cursed commander seeks to spread the fire to other vessels and expand the accursed fleet."}
  - {min: 61, max: 70, text: "Forgeborn: Uncanny metal automatons who are said to embody the stolen souls of dead mariners. They cruise the isles in ironclad ships."}
  - {min: 71, max: 80, text: "Gilded Fleet: Pirates who seized a forbidden treasure. They are cursed with a ceaseless, insatiable hunger to hoard riches from all corners of the isles."}
  - {min: 81, max: 90, text: "Nightships: Dread ships of the vampire clans, shrouded in an eternal gloom. Their undead crews leave wrecks and blood-drained corpses in their wake."}
  - {min: 91, max: 100, text: "Tidebound: Devout cultists who were granted eternal life in exchange for unending service their patron sea god. They must not tarry on land or at anchor, lest death catches up with them to take its toll."}
