source: Sundered Isles
oracles:
- category: Miscellaneous Oracles
  name: Interlude Scenes
  id: sundered_isles/oracles/misc/interlude_scenes
  rows:
  - {min: 1, max: 4, text: "Chronicle your Adventures: What do you describe within logs, journals, or maps? What place or adventure still calls to you?"}
  - {min: 5, max: 8, text: "Commune with nature: What flora or fauna do you encounter? What inspiration do you draw from the experience?"}
  - {min: 9, max: 11, text: "Concoct a plan: What new strategy do you devise? How will you put this plan in motion?"}
  - {min: 12, max: 14, text: "Conduct research: What is the nature of the research? What information or insight do you gain?"}
  - {min: 15, max: 17, text: "Conduct training: What skills or knowledge do you share? Who accepts the guidance, and who resists it?"}
  - {min: 18, max: 20, text: "Confess a secret: What do you reveal of your nature or background? How do others respond?"}
  - {min: 21, max: 24, text: "Conjure up the past: What is the subject of this reminiscence? Why is it meaningful in this moment?"}
  - {min: 25, max: 27, text: "Create an object or artwork: What do you create? What is it intended for?"}
  - {min: 28, max: 31, text: "Experience a dream or vision: What is the nature of the dream or vision? What meaning do you draw from it?"}
  - {min: 32, max: 34, text: "Fight in a sparring match: Who do you spar with? What issues do you provoke or resolve during the match?"}
  - {min: 35, max: 37, text: "Find peace: How do you reflect, meditate, or pray? What enlightenment do you gain?"}
  - {min: 38, max: 40, text: "Hear a confession: Who shares an aspect of their nature or background? What do they reveal?"}
  - {min: 41, max: 43, text: "Indulge a vice: What weakness or need do you indulge? How is this viewed by others?"}
  - {min: 44, max: 47, text: "Join an event: What is the occasion of this social gathering? How do you participate?"}
  - {min: 48, max: 50, text: "Lead or join a song: What is the subject of this song? Why is it meaningful to you or others?"}
  - {min: 51, max: 53, text: "Motivate others: Why is this motivation needed, and what is your approach? How do they respond?"}
  - {min: 54, max: 56, text: "Play a game: Who do you play with? What is discussed during the game?"}
  - {min: 57, max: 60, text: "Practice a skill: What talent do you hone? What do you learn from the exercise?"}
  - {min: 61, max: 64, text: "Ready your gear: How do you maintain your equipment or gear up? What are you preparing for?"}
  - {min: 65, max: 67, text: "Record a message: Who is the message meant for? What news or feelings do you share?"}
  - {min: 68, max: 70, text: "Reinvent your look: What inspires you to remake yourself? How do you debut your new look?"}
  - {min: 71, max: 73, text: "Settle a conflict: What caused this argument or fight? How do you resolve the situation?"}
  - {min: 74, max: 76, text: "Share intimacy: Who do you spend time with? How does your relationship evolve?"}
  - {min: 77, max: 79, text: "Share your heritage: What do you offer of your family's or people's history? What memory or regret does it evoke?"}
  - {min: 80, max: 82, text: "Stay vigilant: What are you on the lookout for? What do you spot or overhear?"}
  - {min: 83, max: 85, text: "Stir up trouble: What conflict do you incite or inflame? Why is the situation left unresolved?"}
  - {min: 86, max: 89, text: "Take in the view: What sublime or dramatic scenery do you witness? What emotion or memory does it inspire?"}
  - {min: 90, max: 92, text: "Tell a tale: What is the nature of this myth or legend? What emotion or lesson lingers after the telling?"}
  - {min: 93, max: 96, text: "Undertake a communal labor: What demanding project do you embark on with others? How does this bring you closer together?"}
  - {min: 97, max: 100, text: "Undertake a menial task: What solitary chore do you perform? What do you daydream about as you work?"}
- category: Miscellaneous Oracles
  name: Prompts
  id: sundered_isles/oracles/misc/prompts
  rows:
  - {min: 1, max: 20, text: "Action + Theme"}
  - {min: 21, max: 40, text: "Action + Focus"}
  - {min: 41, max: 60, text: "Descriptor + Theme"}
  - {min: 61, max: 80, text: "Descriptor + Focus"}
  - {min: 81, max: 100, text: "Action + Descriptor + Focus"}
