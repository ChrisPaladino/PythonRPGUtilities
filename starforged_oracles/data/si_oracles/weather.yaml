source: Sundered Isles
oracles:
- category: Weather
  name: Foul Weather
  id: sundered_isles/oracles/weather/foul
  cursed_version: sundered_isles/oracles/weather/cursed
  rows:
  - {min: 1, max: 10, text: "Stifling: Windless, oppressive heat"}
  - {min: 11, max: 25, text: "Listless: Light winds and sweltering heat"}
  - {min: 26, max: 40, text: "Misty: Light winds and damp fog"}
  - {min: 41, max: 55, text: "Foggy: Light winds and dense fog"}
  - {min: 56, max: 75, text: "Heavy: High winds, steady rain, and rough waters"}
  - {min: 76, max: 90, text: "Stormy: Powerful winds, pelting rain, and high seas"}
  - {min: 91, max: 100, text: "Raging: Destructive winds, torrential rain, and monstrous waves"}
- category: Weather
  name: Duration of Foul or Cursed Weather
  id: sundered_isles/oracles/weather/duration
  rows:
  - {min: 1, max: 2, text: "Fleeting (less than an hour)"}
  - {min: 3, max: 9, text: "Persistent (several hours)"}
  - {min: 10, max: 10, text: "Relentless (more than a day)"}
- category: Weather
  name: Cursed Weather
  id: sundered_isles/oracles/weather/cursed
  rows:
  - {min: 1, max: 5, text: "Ash storm: Churning, low-level clouds of gray ash"}
  - {min: 6, max: 10, text: "Blighting muck: Rain of corrosive, mucous-like ooze"}
  - {min: 11, max: 15, text: "Blood rain: Ghastly, crimson rain"}
  - {min: 16, max: 20, text: "Cinder rain: Storm of fiery rock and ash"}
  - {min: 21, max: 25, text: "Creeping mist: Slithering, grasping fog"}
  - {min: 26, max: 30, text: "Crimson mist: Slow-moving fog that burns like acid"}
  - {min: 31, max: 35, text: "Dead calm: Disquieting stillness"}
  - {min: 36, max: 40, text: "Fisher's Feast: Shower of fish"}
  - {min: 41, max: 45, text: "Forge's Fury: Fast-moving storm of scorching heat"}
  - {min: 46, max: 50, text: "Gloam tide: Unnatural darkness that moves with the tide"}
  - {min: 51, max: 55, text: "Ice fall: Uncanny cold that leaves surfaces enveloped in thick ice"}
  - {min: 56, max: 60, text: "Iron wind: Strong wind that sends ships along an inevitable, fatebound course"}
  - {min: 61, max: 65, text: "Knowing mist: Fog that manifests visions of dark secrets and painful memories"}
  - {min: 66, max: 70, text: "Phantom mist: Ghost-haunted fog"}
  - {min: 71, max: 75, text: "Rot wind: Wind that carries the foul stench of death"}
  - {min: 76, max: 80, text: "Sand storm: Clouds of pelting, stinging sand, ripped from a now-barren island"}
  - {min: 81, max: 85, text: "Seeking spouts: Waterspouts and tornadoes that move with dreadful purpose"}
  - {min: 86, max: 90, text: "Tempest: Undying storm that prowls the isles in search of prey"}
  - {min: 91, max: 95, text: "Wailing wind: Wind that carries the mournful keen of the lost and the drowned"}
  - {min: 96, max: 100, text: "Witch fire: Low clouds suffused with tendrils of chaotic, mystic energy"}
- category: Weather Conditions
  name: Myriads
  id: sundered_isles/oracles/weather/conditions/myriads
  rows:
  - {min: 1, max: 70, text: "Fair Weather"}
  - {min: 71, max: 100, text: "Foul Weather"}
- category: Weather Conditions
  name: Margins
  id: sundered_isles/oracles/weather/conditions/margins
  rows:
  - {min: 1, max: 60, text: "Fair Weather"}
  - {min: 61, max: 100, text: "Foul Weather"}
- category: Weather Conditions
  name: Reaches
  id: sundered_isles/oracles/weather/conditions/reaches
  rows:
  - {min: 1, max: 50, text: "Fair Weather"}
  - {min: 51, max: 100, text: "Foul Weather"}
