source: Sundered Isles
oracles:
- category: Sailing Ships
  name: Size
  id: sundered_isles/oracles/sailing_ships/size
  rows:
  - min: 1
    max: 30
    text: |-
      Small: Rigging:  One or two masts
      Crew:   5–50
      Rank:   Troublesome
      Examples:  Cutter, Sloop
  - min: 31
    max: 55
    text: |-
      Medium: Rigging:  Two or three masts
      Crew:   50–200
      Rank:   Dangerous
      Examples:  Corvette, Schooner
  - min: 56
    max: 75
    text: |-
      Large: Rigging:  Three or more masts
      Crew:   200–500
      Rank:   Formidable
      Examples:  Frigate, Galleon
  - min: 76
    max: 85
    text: |-
      Colossal: Rigging:  Four or more masts
      Crew:   500–1000
      Rank:   Extreme
      Examples:  Dreadnought, Titan
  - {min: 86, max: 95, text: "Flotilla: Medium flagship and a few other ships"}
  - {min: 96, max: 99, text: "Fleet: Large flagship and many other ships"}
  - {min: 100, max: 100, text: "Armada: Colossal flagship and countless other ships"}
