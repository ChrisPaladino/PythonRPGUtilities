source: Sundered Isles
categories:
- name: Session Moves
  moves:
  - name: Begin a Session
    roll_type: no_roll
    trigger: When you begin a significant session or chapter of play...
    text: "When you begin a significant session or chapter of play, do all of the following.\n\n  * Identify or adjust flagged\
      \ content and Set a Flag.\n  * Review or recap what happened last session.\n  * Set the scene by envisioning your character's\
      \ current situation and intent.\n\nIn addition, you may spotlight a new danger, opportunity, or insight. This can include\
      \ a scene hidden from your character's perspective. If you do, envision a brief vignette (you may roll or choose on\
      \ the table below for inspiration). Then, all players take +1 momentum as you return to play from the viewpoint of your\
      \ characters."
    tables:
    - name: Begin a Session
      rows:
      - min: 1
        max: 10
        text: Flashback reveals an aspect of your background or nature
      - min: 11
        max: 20
        text: Flashback reveals an aspect of another character, place, or faction
      - min: 21
        max: 30
        text: Influential character or faction is introduced or given new detail
      - min: 31
        max: 40
        text: Seemingly unrelated situations are shown to be connected
      - min: 41
        max: 50
        text: External factors create new danger, urgency, or importance for a quest
      - min: 51
        max: 60
        text: Important character is put in danger or suffers a misadventure
      - min: 61
        max: 70
        text: Key location is made unsafe or becomes mired in conflict
      - min: 71
        max: 80
        text: Unexpected return of an enemy or threat
      - min: 81
        max: 90
        text: Peril lies ahead or lurks just out of view
      - min: 91
        max: 100
        text: Unforeseen aid is on the way or within reach
  - name: Set a Flag
    roll_type: no_roll
    trigger: When you identify situations or topics you don't want to include, don't want to envision in detail, or otherwise
      may need mindfulness when approaching...
    text: 'When you identify situations or topics you don''t want to include, don''t want to envision in detail, or otherwise
      may need mindfulness when approaching, that content is now flagged.


      When you encounter content flagged as something to approach mindfully, pause to consider or discuss its role in your
      story. When you come across flagged content that you would rather adjust or omit, Change Your Fate.'
  - name: Change Your Fate
    roll_type: no_roll
    trigger: When you encounter flagged content, reject an oracle, resist a consequence, or otherwise need to shift your circumstances
      within the game for your comfort or enjoyment...
    text: "When you encounter flagged content, reject an oracle, resist a consequence, or otherwise need to shift your circumstances\
      \ within the game for your comfort or enjoyment, pause and identify what needs to be changed. Choose as many options\
      \ as appropriate.\n\n  * Reframe: This didn't happen the way you first thought. Envision the moment from another perspective\
      \ in a way that diminishes or changes the content.\n  * Refocus: This is not the most important thing happening right\
      \ now. Envision how the spotlight shifts to change the focus.\n  * Replace: This happens but with a small adjustment.\
      \ Switch out an element and envision how this new detail changes the scenario.\n  * Redirect: Adjust the trajectory\
      \ to involve a helping hand. Envision how another person or party becomes involved.\n  * Reshape: The situation changes\
      \ completely. Envision what happened instead."
  - name: Take a Break
    roll_type: no_roll
    trigger: When you resolve a progress move or complete an intense scenario...
    text: "When you resolve a progress move or complete an intense scenario, take a few deep breaths and take some time to\
      \ attend to the needs of your body. Reflect on what just happened and how it made you feel. Then, choose one.\n\n  *\
      \ Move on: Continue the session. You or an ally may add +1 on the next move (not a progress move), bolstered by your\
      \ reflection and past experiences.\n  * Stop for now: End a Session."
  - name: End a Session
    roll_type: no_roll
    trigger: When you end a significant session or chapter of play...
    text: "When you end a significant session or chapter of play, reflect on the events of the game and identify any missed\
      \ opportunities to mark progress.\n\n  * If you strengthened your ties to a connection, Develop Your Relationship.\n\
      \  * If you moved forward on a quest, Reach a Milestone.\n\nIf there is a quest, connection, or other situation you\
      \ would like to give focus in your next session, make note of it and take +1 momentum."
- name: Adventure Moves
  moves:
  - name: Face Danger
    roll_type: action_roll
    trigger: When you attempt something risky or react to an imminent threat...
    text: "When you attempt something risky or react to an imminent threat, envision your action and roll. If you act...\n\
      \n  * With speed, mobility, or agility: Roll +edge\n  * With resolve, command, or sociability: Roll +heart\n  * With\
      \ strength, endurance, or aggression: Roll +iron\n  * With deception, stealth, or trickery: Roll +shadow\n  * With expertise,\
      \ focus, or observation: Roll +wits\n\nOn a strong hit, you are successful. Take +1 momentum.\n\nOn a weak hit, you\
      \ succeed, but not without a cost. Make a suffer move (-1).\n\nOn a miss, you fail, or a momentary success is undermined\
      \ by a dire turn of events. Pay the Price."
    outcomes:
      strong_hit: You are successful. Take +1 momentum.
      weak_hit: You succeed, but not without a cost. Make a suffer move (-1).
      miss: You fail, or a momentary success is undermined by a dire turn of events. Pay the Price.
  - name: Secure an Advantage
    roll_type: action_roll
    trigger: When you assess a situation, make preparations, or attempt to gain leverage...
    text: "When you assess a situation, make preparations, or attempt to gain leverage, envision your action and roll. If\
      \ you act...\n\n  * With speed, mobility, or agility: Roll +edge\n  * With resolve, command, or sociability: Roll +heart\n\
      \  * With strength, endurance, or aggression: Roll +iron\n  * With deception, stealth, or trickery: Roll +shadow\n \
      \ * With expertise, focus, or observation: Roll +wits\n\nOn a hit, you succeed. On a strong hit, take both. On a weak\
      \ hit, choose one.\n\n  * Take +2 momentum\n  * Add +1 on your next move (not a progress move)\n\nOn a miss, you fail\
      \ or your assumptions betray you. Pay the Price."
    outcomes:
      strong_hit: You succeed. Take both — +2 momentum and +1 on your next move (not a progress move).
      weak_hit: You succeed. Choose one — Take +2 momentum, or add +1 on your next move (not a progress move).
      miss: You fail or your assumptions betray you. Pay the Price.
  - name: Gather Information
    roll_type: action_roll
    trigger: When you search for clues, conduct an investigation, analyze evidence, or do research...
    text: 'When you search for clues, conduct an investigation, analyze evidence, or do research, roll +wits.


      On a strong hit, you discover something helpful and specific. The path you must follow or action you must take to make
      progress is made clear. Envision what you learn. Then, take +2 momentum.


      On a weak hit, the information provides new insight, but also complicates your quest. Envision what you discover. Then,
      take +1 momentum.


      On a miss, your investigation unearths a dire threat or reveals an unwelcome truth that undermines your quest. Pay the
      Price.'
    outcomes:
      strong_hit: You discover something helpful and specific. The path forward is made clear. Envision what you learn. Take
        +2 momentum.
      weak_hit: The information provides new insight, but also complicates your quest. Envision what you discover. Take +1
        momentum.
      miss: Your investigation unearths a dire threat or reveals an unwelcome truth that undermines your quest. Pay the Price.
  - name: Compel
    roll_type: action_roll
    trigger: When you try to persuade someone or make them an offer...
    text: "When you try to persuade someone or make them an offer, envision your approach. If you...\n\n  * Charm, pacify,\
      \ encourage, or barter: Roll +heart\n  * Threaten or incite: Roll +iron\n  * Lie or swindle: Roll +shadow\n\nOn a strong\
      \ hit, they'll do what you want or agree to your conditions. Take +1 momentum.\n\nOn a weak hit, as above, but their\
      \ agreement comes with a demand or complication. Envision their counteroffer.\n\nOn a miss, they refuse or make a demand\
      \ that costs you greatly. Pay the Price."
    outcomes:
      strong_hit: They'll do what you want or agree to your conditions. Take +1 momentum.
      weak_hit: They agree, but their agreement comes with a demand or complication. Envision their counteroffer.
      miss: They refuse or make a demand that costs you greatly. Pay the Price.
  - name: Aid Your Ally
    roll_type: no_roll
    trigger: When you act in direct support of an ally...
    text: 'When you act in direct support of an ally, envision how you aid them. Then, Secure an Advantage or Gain Ground
      to take action. If you score a hit, they (instead of you) take the benefits of the move.


      If you Gain Ground and score a strong hit, you are both in control. On a weak hit, your ally is in control but you are
      in a bad spot.'
  - name: Check Your Gear
    roll_type: action_roll
    trigger: When you check to see if you have a specific helpful item or resource...
    text: "When you check to see if you have a specific helpful item or resource, roll +supply.\n\nOn a strong hit, you have\
      \ it, and are ready to act. Take +1 momentum.\n\nOn a weak hit, you have it, but must choose one.\n\n  * Your supply\
      \ is diminished: Sacrifice Resources (-1)\n  * It's not quite right, and causes a complication or delay: Lose Momentum\
      \ (-2)\n\nOn a miss, you don't have it and the situation grows more perilous. Pay the Price."
    outcomes:
      strong_hit: You have it, and are ready to act. Take +1 momentum.
      weak_hit: You have it, but must choose one — Sacrifice Resources (-1), or Lose Momentum (-2).
      miss: You don't have it and the situation grows more perilous. Pay the Price.
- name: Quest Moves
  moves:
  - name: Swear an Iron Vow
    roll_type: action_roll
    trigger: When you swear to complete a quest...
    text: 'When you swear to complete a quest, write your vow and give it a rank. Then, roll +heart. If you swear this vow
      to a connection, add +1; if you share a bond, add +2.


      On a strong hit, you are emboldened and it is clear what you must do next. Take +2 momentum.


      On a weak hit, you are determined but begin your quest with more questions than answers. Take +1 momentum, and envision
      what you do to find a path forward.


      On a miss, you must overcome a significant obstacle before you begin your quest. Envision what stands in your way.'
    outcomes:
      strong_hit: You are emboldened and it is clear what you must do next. Take +2 momentum.
      weak_hit: You are determined but begin your quest with more questions than answers. Take +1 momentum, and envision what
        you do to find a path forward.
      miss: You must overcome a significant obstacle before you begin your quest. Envision what stands in your way.
  - name: Reach a Milestone
    roll_type: no_roll
    trigger: When you make headway in your quest...
    text: "When you make headway in your quest by doing any of the following...\n\n  * Overcoming a critical obstacle\n  *\
      \ Gaining meaningful insight\n  * Completing a perilous expedition\n  * Acquiring a crucial item or resource\n  * Earning\
      \ vital support\n  * Defeating a notable foe\n\n...you may mark progress per the rank of the vow."
  - name: Fulfill Your Vow
    roll_type: progress_roll
    trigger: When you reach the end of your quest...
    text: "Progress Move — When you reach the end of your quest, roll the challenge dice and compare to your progress.\n\n\
      On a strong hit, your vow is fulfilled. Mark a reward on your quests legacy track per the vow's rank: troublesome=1\
      \ tick; dangerous=2 ticks; formidable=1 box; extreme=2 boxes; epic=3 boxes. Any allies who shared this vow also mark\
      \ the reward.\n\nOn a weak hit, as above, but there is more to be done or you realize the truth of your quest. If you\
      \ Swear an Iron Vow to set things right, take your full legacy reward. Otherwise, make the legacy reward one rank lower\
      \ (none for a troublesome quest).\n\nOn a miss, your vow is undone through an unexpected complication or realization.\
      \ Envision what happens and choose one.\n\n  * Give up on the quest: Forsake Your Vow.\n  * Recommit to the quest: Roll\
      \ both challenge dice, take the lowest value, and clear that number of progress boxes. Then, raise the vow's rank by\
      \ one (if not already epic)."
    outcomes:
      strong_hit: 'Your vow is fulfilled. Mark a legacy reward per the vow''s rank: troublesome=1 tick; dangerous=2 ticks;
        formidable=1 box; extreme=2 boxes; epic=3 boxes. Allies who shared this vow also mark the reward.'
      weak_hit: Your vow is fulfilled, but there is more to be done or you realize the truth of your quest. Swear an Iron
        Vow to set things right for the full legacy reward, or take the reward one rank lower (none for troublesome).
      miss: Your vow is undone. Choose one — Forsake Your Vow, or recommit by rolling both challenge dice, taking the lowest,
        clearing that many progress boxes, and raising the vow's rank by one.
  - name: Forsake Your Vow
    roll_type: no_roll
    trigger: When you renounce your quest, betray your promise, or the goal is lost to you...
    text: "When you renounce your quest, betray your promise, or the goal is lost to you, clear the vow.\n\nThen, envision\
      \ the impact of this failure and choose one or more as appropriate to the nature of the vow. Any allies who shared this\
      \ vow may also envision a cost.\n\n  * You are demoralized or dispirited: Endure Stress\n  * A connection loses faith:\
      \ Test Your Relationship when you next interact.\n  * You must abandon a path or resource: Discard an asset.\n  * Someone\
      \ else pays a price: Envision how a person, being, or community bears the cost of the failure.\n  * Someone else takes\
      \ advantage: Envision how an enemy gains power.\n  * Your reputation suffers: Envision how this failure marks you."
- name: Connection Moves
  moves:
  - name: Make a Connection
    roll_type: action_roll
    trigger: When you search out a new relationship or give focus to an existing relationship (not an ally or companion)...
    text: 'When you search out a new relationship or give focus to an existing relationship (not an ally or companion), roll
      +heart.


      On a strong hit, you create a connection. Give them a role and rank. Whenever your connection aids you on a move closely
      associated with their role, add +1 and take +1 momentum on a hit.


      On a weak hit, as above, but this connection comes with a complication or cost. Envision what they reveal or demand.


      On a miss, you don''t make a connection and the situation worsens. Pay the Price.'
    outcomes:
      strong_hit: You create a connection. Give them a role and rank. Whenever they aid you on a move closely associated with
        their role, add +1 and take +1 momentum on a hit.
      weak_hit: You create a connection (give them a role and rank), but this comes with a complication or cost. Envision
        what they reveal or demand.
      miss: You don't make a connection and the situation worsens. Pay the Price.
  - name: Develop Your Relationship
    roll_type: no_roll
    trigger: When you reinforce your relationship with a connection...
    text: "When you reinforce your relationship with a connection by doing any of the following...\n\n  * Swearing a vow to\
      \ undertake a perilous quest in their service\n  * Completing a quest to their benefit\n  * Leveraging their help in\
      \ desperate circumstances\n  * Giving them something of worth\n  * Sharing a profound moment\n  * Standing with them\
      \ against hardship\n  * Overcoming a test of your relationship\n\n...you may mark progress per the rank of the connection.\n\
      \nIf you already share a bond with the connection, do not mark progress. Instead, roll +their rank to learn the impact\
      \ on your legacy: troublesome=+1; dangerous=+2; formidable=+3; extreme=+4; epic=+5. On a strong hit, mark 2 ticks on\
      \ your bonds legacy track. On a strong hit with a match, you may also envision how recent events bolstered your connection's\
      \ standing and raise their rank by one (if not already epic). On a weak hit, take +2 momentum. On a miss, take no lasting\
      \ benefit."
  - name: Test Your Relationship
    roll_type: action_roll
    trigger: When your relationship with a connection is tested through conflict, betrayal, or circumstance...
    text: "When your relationship with a connection is tested through conflict, betrayal, or circumstance, roll +heart. If\
      \ you share a bond, add +1.\n\nOn a strong hit, Develop Your Relationship.\n\nOn a weak hit, Develop Your Relationship,\
      \ but also envision a demand or complication as a fallout of this test.\n\nOn a miss, or if you have no interest in\
      \ maintaining this relationship, choose one.\n\n  * Lose the connection: Envision how this impacts you and Pay the Price.\n\
      \  * Prove your loyalty: Envision what you offer or what they demand, and Swear an Iron Vow (formidable or greater)\
      \ to see it done. Until you complete the quest, take no benefit for the connection. If you refuse or fail, the connection\
      \ is permanently undone."
    outcomes:
      strong_hit: Develop Your Relationship.
      weak_hit: Develop Your Relationship, but also envision a demand or complication as a fallout of this test.
      miss: Choose one — Lose the connection (envision how this impacts you and Pay the Price), or prove your loyalty by Swearing
        an Iron Vow (formidable or greater). Until that quest is complete, take no benefit for the connection.
  - name: Forge a Bond
    roll_type: progress_roll
    trigger: When your relationship with a connection is ready to evolve...
    text: "Progress Move — When your relationship with a connection is ready to evolve, roll the challenge dice and compare\
      \ to your progress.\n\nOn a strong hit, you now share a bond. Mark a reward on your bonds legacy track per the connection's\
      \ rank: troublesome=1 tick; dangerous=2 ticks; formidable=1 box; extreme=2 boxes; epic=3 boxes. Any allies who share\
      \ this connection also mark the reward. Then, choose one.\n\n  * Bolster their influence: When they aid you on a move\
      \ closely associated with their role, add +2 instead of +1.\n  * Expand their influence: Give them a second role. When\
      \ they aid you on a move closely associated with either role, add +1 and take +1 momentum on a hit.\n\nOn a weak hit,\
      \ as above, but they ask something more of you first. To gain the bond and the legacy reward, envision the nature of\
      \ the request, and do it (or Swear an Iron Vow to see it done).\n\nOn a miss, they reveal a motivation or background\
      \ that puts you at odds. If you recommit to this relationship, roll both challenge dice, take the lowest value, and\
      \ clear that number of progress boxes. Then, raise the connection's rank by one (if not already epic)."
    outcomes:
      strong_hit: 'You now share a bond. Mark a legacy reward per the connection''s rank: troublesome=1 tick; dangerous=2
        ticks; formidable=1 box; extreme=2 boxes; epic=3 boxes. Allies who share this connection also mark the reward. Choose
        one — bolster their influence (+2 instead of +1) or expand their influence (give them a second role).'
      weak_hit: You now share a bond and mark the legacy reward, but they ask something more of you first. Envision the request
        and do it (or Swear an Iron Vow to see it done).
      miss: They reveal a motivation or background that puts you at odds. Recommit by rolling both challenge dice, taking
        the lowest, clearing that many progress boxes, and raising their rank by one (if not already epic).
- name: Exploration Moves
  moves:
  - name: Undertake an Expedition
    roll_type: action_roll
    trigger: When you sail an unfamiliar route through perilous seas, find the way across hazardous terrain, or explore a
      mysterious site...
    text: "When you sail an unfamiliar route through perilous seas, find the way across hazardous terrain, or explore a mysterious\
      \ site, give the expedition a name and rank.\n\nThen, for each segment of the expedition, envision your approach. If\
      \ you...\n\n  * Move at speed: Roll +edge\n  * Keep a low profile: Roll +shadow\n  * Stay vigilant: Roll +wits\n\nOn\
      \ a strong hit, you reach a waypoint. Envision the location and mark progress per the rank of the expedition.\n\nOn\
      \ a weak hit, as above, but this progress costs you. Choose one.\n\n  * Suffer costs en route: Make a suffer move (-2),\
      \ or two suffer moves (-1).\n  * Face a peril at the waypoint: Envision what you encounter.\n\nOn a miss, you are waylaid\
      \ by a crisis, or arrive at a waypoint to confront an immediate hardship or threat. Do not mark progress, and Pay the\
      \ Price."
    outcomes:
      strong_hit: You reach a waypoint. Envision the location and mark progress per the rank of the expedition.
      weak_hit: 'You reach a waypoint and mark progress, but this costs you. Choose one — Suffer costs en route: Make a suffer
        move (-2), or two suffer moves (-1); or Face a peril at the waypoint: Envision what you encounter.'
      miss: You are waylaid by a crisis, or arrive at a waypoint to confront an immediate hardship or threat. Do not mark
        progress, and Pay the Price.
  - name: Explore a Waypoint
    roll_type: action_roll
    trigger: When you divert from an expedition to examine a notable location...
    text: "When you divert from an expedition to examine a notable location, roll +wits.\n\nOn a strong hit, choose one. On\
      \ a strong hit with a match, you may instead Make a Discovery.\n\n  * Find an opportunity: Envision a favorable insight,\
      \ situation, resource, or encounter. Then, take +2 momentum.\n  * Gain progress: Mark progress on your expedition, per\
      \ its rank.\n\nOn a weak hit, you uncover something interesting, but it is bound up in a peril or reveals an ominous\
      \ aspect of this place. Envision what you encounter. Then, take +1 momentum.\n\nOn a miss, you encounter an immediate\
      \ hardship or threat, and must Pay the Price. On a miss with a match, you may instead Confront Chaos."
    outcomes:
      strong_hit: Choose one — Find an opportunity (envision a favorable insight, situation, resource, or encounter; take
        +2 momentum), or Gain progress (mark progress on your expedition per its rank). On a match, you may instead Make a
        Discovery.
      weak_hit: You uncover something interesting, but it is bound up in a peril or reveals an ominous aspect of this place.
        Envision what you encounter. Take +1 momentum.
      miss: You encounter an immediate hardship or threat, and must Pay the Price. On a match, you may instead Confront Chaos.
  - name: Make a Discovery
    roll_type: no_roll
    trigger: When your exploration of a waypoint uncovers something wondrous...
    text: When your exploration of a waypoint uncovers something wondrous, roll on the table below or choose one. Then, envision
      the nature of the discovery and how it is revealed. When you first experience or engage with the discovery, you and
      your allies may mark two ticks on your discoveries legacy track.
    tables:
    - name: Make a Discovery
      rows:
      - min: 1
        max: 5
        text: Abundant and unusual life
      - min: 6
        max: 10
        text: Archive or map with revelatory details
      - min: 11
        max: 15
        text: Awe-inspiring natural feature
      - min: 16
        max: 19
        text: Beneficial enchantment or powers
      - min: 20
        max: 23
        text: Benevolent spirit or apparition
      - min: 24
        max: 28
        text: Clues to an enduring mystery
      - min: 29
        max: 33
        text: Extraordinary natural phenomenon
      - min: 34
        max: 38
        text: Majestic or remarkable creature
      - min: 39
        max: 42
        text: Manifestation of a myth or legend
      - min: 43
        max: 47
        text: Monumental architecture or artistry
      - min: 48
        max: 52
        text: Otherworldly path or passage
      - min: 53
        max: 57
        text: People with phenomenal abilities
      - min: 58
        max: 61
        text: Prized natural resource
      - min: 62
        max: 65
        text: Relic of legendary power
      - min: 66
        max: 70
        text: Safeguarded or hidden location
      - min: 71
        max: 75
        text: Sizable treasure
      - min: 76
        max: 80
        text: Unique machine or technology
      - min: 81
        max: 85
        text: Well-preserved artifact or specimen
      - min: 86
        max: 90
        text: Wondrous visions or prophesies
      - min: 91
        max: 100
        text: Roll twice
  - name: Confront Chaos
    roll_type: no_roll
    trigger: When your exploration of a waypoint uncovers something dreadful...
    text: 'When your exploration of a waypoint uncovers something dreadful, decide the number of aspects: one, two, or three.
      Roll that number of times or choose that number of aspects on the table below. Then, envision how the encounter begins.


      For each result, when you first confront that aspect within the scope of the encounter, you and your allies may mark
      one tick on your discoveries legacy track.'
    tables:
    - name: Confront Chaos
      rows:
      - min: 1
        max: 5
        text: Archive or map bearing a dire warning
      - min: 6
        max: 10
        text: Baneful spells or wards
      - min: 11
        max: 15
        text: Blighted or corrupted habitat
      - min: 16
        max: 20
        text: Cataclysmic natural phenomenon
      - min: 21
        max: 25
        text: Cursed treasure of irresistible lure
      - min: 26
        max: 30
        text: Dead given unnatural life
      - min: 31
        max: 35
        text: Fanatical followers of a dreadful power
      - min: 36
        max: 40
        text: Fearsome creature of monstrous size
      - min: 41
        max: 45
        text: Harrowing visions or prophesies
      - min: 46
        max: 50
        text: Malevolent being of dreadful power
      - min: 51
        max: 55
        text: Malignant affliction or parasite
      - min: 56
        max: 60
        text: People of monstrous form
      - min: 61
        max: 65
        text: Relic of accursed power
      - min: 66
        max: 70
        text: Ruinous machine or technology
      - min: 71
        max: 75
        text: Signs of an awakened evil
      - min: 76
        max: 80
        text: Site of a baffling disappearance
      - min: 81
        max: 85
        text: Site of great destruction
      - min: 86
        max: 90
        text: Site of terrible carnage
      - min: 91
        max: 95
        text: Swarming creatures of insatiable fury
      - min: 96
        max: 100
        text: Wrathful spirit or apparition
  - name: Finish an Expedition
    roll_type: progress_roll
    trigger: When your expedition comes to an end...
    text: "Progress Move — When your expedition comes to an end, roll the challenge dice and compare to your progress.\n\n\
      On a strong hit, you reach your destination or complete your survey. Mark a reward on your discoveries legacy track\
      \ per the expedition's rank: troublesome=1 tick; dangerous=2 ticks; formidable=1 box; extreme=2 boxes; epic=3 boxes.\
      \ Any allies who shared this expedition also mark the reward.\n\nOn a weak hit, as above, but you face an unforeseen\
      \ complication at the end of your expedition. Make the legacy reward one rank lower (none for a troublesome expedition),\
      \ and envision what you encounter.\n\nOn a miss, your destination is lost to you, or you come to understand the true\
      \ nature or cost of the expedition. Envision what happens and choose one.\n\n  * Abandon the expedition: Envision the\
      \ cost of this setback and Pay the Price.\n  * Return to the expedition: Roll both challenge dice, take the lowest value,\
      \ and clear that number of progress boxes. Then, raise the expedition's rank by one (if not already epic)."
    outcomes:
      strong_hit: 'You reach your destination or complete your survey. Mark a legacy reward per the expedition''s rank: troublesome=1
        tick; dangerous=2 ticks; formidable=1 box; extreme=2 boxes; epic=3 boxes. Allies who shared this expedition also mark
        the reward.'
      weak_hit: You reach your destination, but face an unforeseen complication. Make the legacy reward one rank lower (none
        for troublesome), and envision what you encounter.
      miss: Your destination is lost to you. Choose one — Abandon the expedition (envision the cost and Pay the Price), or
        Return to the expedition (roll both challenge dice, take the lowest, clear that many progress boxes, and raise the
        rank by one).
  - name: Set a Course
    roll_type: action_roll
    trigger: When you travel a known route through perilous seas, across hazardous terrain, or within a mysterious site...
    text: "When you travel a known route through perilous seas, across hazardous terrain, or within a mysterious site, roll\
      \ +supply.\n\nOn a strong hit, you reach your destination and the situation there favors you. Take +1 momentum.\n\n\
      On a weak hit, you arrive, but face a cost or complication. Choose one.\n\n  * Suffer costs en route: Make a suffer\
      \ move (-2), or two suffer moves (-1).\n  * Face a complication at the destination: Envision what you encounter.\n\n\
      On a miss, you are waylaid by a significant threat, and must Pay the Price. If you overcome this obstacle, you may push\
      \ on safely to your destination."
    outcomes:
      strong_hit: You reach your destination and the situation there favors you. Take +1 momentum.
      weak_hit: 'You arrive, but face a cost or complication. Choose one — Suffer costs en route: Make a suffer move (-2),
        or two suffer moves (-1); or Face a complication at the destination: Envision what you encounter.'
      miss: You are waylaid by a significant threat, and must Pay the Price. If you overcome this obstacle, you may push on
        safely to your destination.
- name: Combat Moves
  moves:
  - name: Enter the Fray
    roll_type: action_roll
    trigger: When you initiate combat or are forced into a fight...
    text: "When you initiate combat or are forced into a fight, envision your objective and give it a rank. If the combat\
      \ includes discrete challenges or phases, set an objective with a rank for each.\n\nThen, roll to see if you are in\
      \ control. If you are...\n\n  * On the move or maneuvering: Roll +edge\n  * In command or facing off against your foe:\
      \ Roll +heart\n  * In the thick of it at close quarters: Roll +iron\n  * Preparing to act against an unaware foe: Roll\
      \ +shadow\n  * Caught in a trap or sizing up the situation: Roll +wits\n\nOn a strong hit, take both. On a weak hit,\
      \ choose one.\n\n  * Take +2 momentum\n  * You are in control\n\nOn a miss, the fight begins with you in a bad spot."
    outcomes:
      strong_hit: Take both — +2 momentum and you are in control.
      weak_hit: Choose one — Take +2 momentum, or you are in control.
      miss: The fight begins with you in a bad spot.
  - name: Gain Ground
    roll_type: action_roll
    trigger: When you are in control and take action in a fight to reinforce your position or move toward an objective...
    text: "When you are in control and take action in a fight to reinforce your position or move toward an objective, envision\
      \ your approach and roll. If you are...\n\n  * In pursuit, fleeing, or maneuvering: Roll +edge\n  * Charging boldly\
      \ into action, coming to the aid of others, negotiating, or commanding: Roll +heart\n  * Gaining leverage with force,\
      \ powering through, or making a threat: Roll +iron\n  * Hiding, preparing an ambush, or misdirecting: Roll +shadow\n\
      \  * Coordinating a plan, studying a situation, or cleverly gaining leverage: Roll +wits\n\nOn a hit, you stay in control.\
      \ On a strong hit, choose two. On a weak hit, choose one.\n\n  * Mark progress\n  * Take +2 momentum\n  * Add +1 on\
      \ your next move (not a progress move)\n\nOn a miss, your foe gains the upper hand, the fight moves to a new location,\
      \ or you encounter a new peril. You are in a bad spot and must Pay the Price."
    outcomes:
      strong_hit: You stay in control. Choose two — Mark progress, Take +2 momentum, or Add +1 on your next move (not a progress
        move).
      weak_hit: You stay in control. Choose one — Mark progress, Take +2 momentum, or Add +1 on your next move (not a progress
        move).
      miss: Your foe gains the upper hand, the fight moves to a new location, or you encounter a new peril. You are in a bad
        spot and must Pay the Price.
  - name: React Under Fire
    roll_type: action_roll
    trigger: When you are in a bad spot and take action in a fight to avoid danger or overcome an obstacle...
    text: "When you are in a bad spot and take action in a fight to avoid danger or overcome an obstacle, envision your approach\
      \ and roll. If you are...\n\n  * In pursuit, fleeing, dodging, getting back into position, or taking cover: Roll +edge\n\
      \  * Remaining stalwart against fear or temptation: Roll +heart\n  * Blocking or diverting with force, or taking the\
      \ hit: Roll +iron\n  * Moving into hiding or creating a distraction: Roll +shadow\n  * Changing the plan, finding a\
      \ way out, or cleverly bypassing an obstacle: Roll +wits\n\nOn a strong hit, you succeed and are in control. Take +1\
      \ momentum.\n\nOn a weak hit, you avoid the worst of the danger or overcome the obstacle, but not without a cost. Make\
      \ a suffer move (-1). You stay in a bad spot.\n\nOn a miss, the situation worsens. You stay in a bad spot and must Pay\
      \ the Price."
    outcomes:
      strong_hit: You succeed and are in control. Take +1 momentum.
      weak_hit: You avoid the worst of the danger or overcome the obstacle, but not without a cost. Make a suffer move (-1).
        You stay in a bad spot.
      miss: The situation worsens. You stay in a bad spot and must Pay the Price.
  - name: Strike
    roll_type: action_roll
    trigger: When you are in control and assault a foe...
    text: 'When you are in control and assault a foe at close quarters, roll +iron; when you attack at a distance, roll +edge.


      On a strong hit, mark progress twice. You dominate your foe and stay in control.


      On a weak hit, mark progress twice, but you expose yourself to danger. You are in a bad spot.


      On a miss, the fight turns against you. You are in a bad spot and must Pay the Price.'
    outcomes:
      strong_hit: Mark progress twice. You dominate your foe and stay in control.
      weak_hit: Mark progress twice, but you expose yourself to danger. You are in a bad spot.
      miss: The fight turns against you. You are in a bad spot and must Pay the Price.
  - name: Clash
    roll_type: action_roll
    trigger: When you are in a bad spot and fight back against a foe...
    text: 'When you are in a bad spot and fight back against a foe at close quarters, roll +iron; when you exchange fire at
      a distance, roll +edge.


      On a strong hit, mark progress twice. You overwhelm your foe and are in control.


      On a weak hit, mark progress, but you are dealt a counterblow or setback. You stay in a bad spot and must Pay the Price.


      On a miss, your foe dominates this exchange. You stay in a bad spot and must Pay the Price.'
    outcomes:
      strong_hit: Mark progress twice. You overwhelm your foe and are in control.
      weak_hit: Mark progress, but you are dealt a counterblow or setback. You stay in a bad spot and must Pay the Price.
      miss: Your foe dominates this exchange. You stay in a bad spot and must Pay the Price.
  - name: Take Decisive Action
    roll_type: progress_roll
    trigger: When you seize an objective in a fight...
    text: 'Progress Move — When you seize an objective in a fight, envision how you take decisive action. Then, roll the challenge
      dice and compare to your progress.


      If you are in control, check the result as normal. If you are in a bad spot, count a strong hit without a match as a
      weak hit, and a weak hit as a miss.


      On a strong hit, you prevail. Take +1 momentum. If any objectives remain and the fight continues, you are in control.


      On a weak hit, you achieve your objective, but not without cost. Roll on the table below or choose one. If the fight
      continues, you are in a bad spot.


      On a miss, you are defeated or your objective is lost. Pay the Price.'
    outcomes:
      strong_hit: You prevail. Take +1 momentum. If any objectives remain and the fight continues, you are in control.
      weak_hit: You achieve your objective, but not without cost. Roll or choose one — It's worse than you thought (suffer
        move -2); Victory is short-lived (new peril or foe); Collateral damage (something lost or broken); Others pay the
        price; Marked for vengeance; or It gets complicated. If the fight continues, you are in a bad spot.
      miss: You are defeated or your objective is lost. Pay the Price.
    tables:
    - name: Take Decisive Action — Weak Hit
      rows:
      - min: 1
        max: 40
        text: 'It''s worse than you thought: Make a suffer move (-2)'
      - min: 41
        max: 52
        text: 'Victory is short-lived: A new peril or foe appears'
      - min: 53
        max: 64
        text: 'You face collateral damage: Something is lost, damaged, or broken'
      - min: 65
        max: 76
        text: 'Others pay the price: Someone else suffers the cost'
      - min: 77
        max: 88
        text: 'Others won''t forget: You are marked for vengeance'
      - min: 89
        max: 100
        text: 'It gets complicated: The true nature of a foe or objective is revealed'
  - name: Face Defeat
    roll_type: no_roll
    trigger: When you abandon or are deprived of an objective...
    text: 'When you abandon or are deprived of an objective, envision the consequence of this failure, clear the objective,
      and Pay the Price.


      If the fight continues, you may create a new objective and give it a rank to represent the changing situation. If any
      objectives remain, the fight continues and you are in a bad spot.'
  - name: Battle
    roll_type: action_roll
    trigger: When you fight a battle and it happens in a blur...
    text: "When you fight a battle and it happens in a blur, envision your objective and roll. If you primarily...\n\n  *\
      \ Fight at range, or using your speed and the environment to your advantage: Roll +edge\n  * Fight depending on your\
      \ courage, leadership, or companions: Roll +heart\n  * Fight in close to overpower your foe: Roll +iron\n  * Fight using\
      \ trickery to befuddle your foe: Roll +shadow\n  * Fight using careful tactics to outsmart your foe: Roll +wits\n\n\
      On a strong hit, you achieve your objective unconditionally. You and any allies who joined the battle may take +2 momentum.\n\
      \nOn a weak hit, you achieve your objective, but not without cost. Pay the Price.\n\nOn a miss, you are defeated or\
      \ the objective is lost. Pay the Price."
    outcomes:
      strong_hit: You achieve your objective unconditionally. You and any allies who joined the battle may take +2 momentum.
      weak_hit: You achieve your objective, but not without cost. Pay the Price.
      miss: You are defeated or the objective is lost. Pay the Price.
- name: Suffer Moves
  moves:
  - name: Lose Momentum
    roll_type: no_roll
    trigger: When you are delayed or disadvantaged...
    text: "When you are delayed or disadvantaged, suffer -1 momentum for a minor setback, -2 for a serious setback, or -3\
      \ for a major setback.\n\nWhen your momentum is at its minimum (-6) and you must suffer -momentum, choose one.\n\n \
      \ * Envision how the price is paid and apply the cost to a different suffer move.\n  * Envision how this undermines\
      \ your progress on a vow, expedition, connection, or combat. Then, clear 1 unit of progress on that track per its rank:\
      \ troublesome=3 boxes; dangerous=2 boxes; formidable=1 box; extreme=2 ticks; epic=1 tick."
  - name: Endure Harm
    roll_type: action_roll
    trigger: When you face physical injury, fatigue, or illness...
    text: "When you face physical injury, fatigue, or illness, suffer -1 health for minor harm, -2 for serious harm, or -3\
      \ for major harm. If your health is 0, Lose Momentum equal to any remaining harm.\n\nThen, if your health is 0 or you\
      \ choose to resist the harm, roll +health or +iron, whichever is higher.\n\nOn a strong hit, choose one.\n\n  * Shake\
      \ it off: If you are not wounded, take +1 health\n  * Embrace the pain: Take +1 momentum\n\nOn a weak hit, if you are\
      \ not wounded, you may Lose Momentum (-1) in exchange for +1 health. Otherwise, press on.\n\nOn a miss, it's worse than\
      \ you thought. Suffer an additional -1 health or Lose Momentum (-2). If your health is 0, you must also mark wounded\
      \ or permanently harmed, or roll on the table below."
    outcomes:
      strong_hit: Choose one — Shake it off (if not wounded, take +1 health), or Embrace the pain (take +1 momentum).
      weak_hit: If you are not wounded, you may Lose Momentum (-1) in exchange for +1 health. Otherwise, press on.
      miss: It's worse than you thought. Suffer an additional -1 health or Lose Momentum (-2). If your health is 0, mark wounded
        or permanently harmed, or roll on the harm table.
    tables:
    - name: Endure Harm
      rows:
      - min: 1
        max: 10
        text: You suffer mortal harm. Face Death.
      - min: 11
        max: 20
        text: You are dying. Within an hour or two, you must Heal and raise your health above 0, or Face Death.
      - min: 21
        max: 35
        text: You are unconscious and out of action. If left alone, you come back to your senses in an hour or two. If you
          are vulnerable to ongoing harm, Face Death.
      - min: 36
        max: 50
        text: You are reeling. If you engage in any vigorous activity before taking a breather, roll on this table again.
      - min: 51
        max: 100
        text: You are still standing.
  - name: Endure Stress
    roll_type: action_roll
    trigger: When you face mental strain, shock, or despair...
    text: "When you face mental strain, shock, or despair, suffer -1 spirit for minor stress, -2 for serious stress, or -3\
      \ for major stress. If your spirit is 0, Lose Momentum equal to any remaining stress.\n\nThen, if your spirit is 0 or\
      \ you choose to resist the stress, roll +spirit or +heart, whichever is higher.\n\nOn a strong hit, choose one.\n\n\
      \  * Shake it off: If you are not shaken, take +1 spirit\n  * Embrace the darkness: Take +1 momentum\n\nOn a weak hit,\
      \ if you are not shaken, you may Lose Momentum (-1) in exchange for +1 spirit. Otherwise, press on.\n\nOn a miss, it's\
      \ worse than you thought. Suffer an additional -1 spirit or Lose Momentum (-2). If your spirit is 0, you must also mark\
      \ shaken or traumatized, or roll on the table below."
    outcomes:
      strong_hit: Choose one — Shake it off (if not shaken, take +1 spirit), or Embrace the darkness (take +1 momentum).
      weak_hit: If you are not shaken, you may Lose Momentum (-1) in exchange for +1 spirit. Otherwise, press on.
      miss: It's worse than you thought. Suffer an additional -1 spirit or Lose Momentum (-2). If your spirit is 0, mark shaken
        or traumatized, or roll on the stress table.
    tables:
    - name: Endure Stress
      rows:
      - min: 1
        max: 10
        text: You are overwhelmed. Face Desolation.
      - min: 11
        max: 25
        text: You give up. Forsake Your Vow.
      - min: 26
        max: 50
        text: You give in to fear or compulsion, and act against your better instincts.
      - min: 51
        max: 100
        text: You persevere.
  - name: Companion Takes a Hit
    roll_type: action_roll
    trigger: When your companion faces physical hardship...
    text: 'When your companion faces physical hardship, they suffer -1 health for minor harm, -2 for serious harm, or -3 for
      major harm. If your companion''s health is 0, Lose Momentum equal to any remaining harm.


      Then, if their health is 0 or you choose to test their resilience, roll +your companion''s health.


      On a strong hit, your companion rallies. Give them +1 health.


      On a weak hit, if your companion''s health is not 0, you may Lose Momentum (-1) and give them +1 health. Otherwise,
      they press on.


      On a miss, it''s worse than you thought. They suffer an additional -1 health or you Lose Momentum (-2). If your companion''s
      health is 0, they are out of action until given aid. If their health is 0 and you rolled a miss with a match on this
      move, they are dead or destroyed; discard the asset.'
    outcomes:
      strong_hit: Your companion rallies. Give them +1 health.
      weak_hit: If your companion's health is not 0, you may Lose Momentum (-1) and give them +1 health. Otherwise, they press
        on.
      miss: It's worse than you thought. They suffer an additional -1 health or you Lose Momentum (-2). If health is 0, they
        are out of action. On a miss with a match, they are dead or destroyed — discard the asset.
  - name: Sacrifice Resources
    roll_type: no_roll
    trigger: When you lose or consume resources...
    text: 'When you lose or consume resources, suffer -1 supply for a minor loss, -2 for a serious loss, or -3 for a major
      loss.


      If your supply is exhausted (reduced to 0), mark unprepared. When you suffer a loss of resources while unprepared, envision
      how this causes you hardship and apply the cost to a different suffer move.'
  - name: Withstand Damage
    roll_type: action_roll
    trigger: When your vehicle faces a damaging situation or environment...
    text: "When your vehicle faces a damaging situation or environment, suffer -1 integrity for minor damage, -2 for serious\
      \ damage, or -3 for major damage. If your integrity is 0, Lose Momentum equal to any remaining damage.\n\nThen, if your\
      \ integrity is 0 or you choose to resist the damage, roll +integrity.\n\nOn a strong hit, choose one.\n\n  * Damage\
      \ control: If your vehicle is not battered, take +1 integrity\n  * Hold fast: Take +1 momentum\n\nOn a weak hit, if\
      \ your vehicle is not battered, you may Lose Momentum (-1) in exchange for +1 integrity. Otherwise, carry on.\n\nOn\
      \ a miss, it's worse than you thought. Suffer an additional -1 integrity or Lose Momentum (-2). If your integrity is\
      \ 0, also suffer a cost according to the vehicle type.\n\n  * Command vehicle: Mark the vehicle as battered or cursed,\
      \ mark a module as broken, destroy a broken module by discarding it, or roll on the table below. If the command vehicle\
      \ is destroyed or sunk, Overcome Destruction.\n  * Support vehicle: Mark the vehicle as battered or roll on the table\
      \ below. If the vehicle is destroyed or sunk, discard the asset.\n  * Incidental vehicle: Roll on the table below."
    outcomes:
      strong_hit: Choose one — Damage control (if not battered, take +1 integrity), or Hold fast (take +1 momentum).
      weak_hit: If your vehicle is not battered, you may Lose Momentum (-1) in exchange for +1 integrity. Otherwise, carry
        on.
      miss: It's worse than you thought. Suffer an additional -1 integrity or Lose Momentum (-2). If integrity is 0, suffer
        a vehicle-type cost or roll on the damage table.
    tables:
    - name: Withstand Damage
      rows:
      - min: 1
        max: 10
        text: Immediate catastrophic destruction or sinking. You and your allies must Endure Harm or Face Death, as appropriate.
      - min: 11
        max: 25
        text: Destruction or sinking is imminent and unavoidable. All aboard must find a way to safety.
      - min: 26
        max: 40
        text: Destruction or sinking is imminent, but can be averted if you Repair your vehicle and raise its integrity above
          0. If you fail, see 11-25.
      - min: 41
        max: 55
        text: You cannot Repair this vehicle until you Resupply and obtain crucial parts or materials. If you roll this result
          again prior to that, see 11-25.
      - min: 56
        max: 70
        text: The vehicle is crippled. To get it back in action, you must Repair and raise its integrity above 0.
      - min: 71
        max: 85
        text: Those aboard bear the brunt of the damage. You and your allies must make the Endure Harm, Endure Stress, or
          Companion Takes a Hit move, suffering a serious (-2) cost.
      - min: 86
        max: 95
        text: You've lost gear, cargo, or provisions. Sacrifice Resources (-2).
      - min: 96
        max: 100
        text: Against all odds, the vehicle holds together.
- name: Threshold Moves
  moves:
  - name: Face Death
    roll_type: action_roll
    trigger: When you encounter a situation where death is an immediate and unavoidable outcome, or are brought to the brink
      of death with a chance for recovery...
    text: "When you encounter a situation where death is an immediate and unavoidable outcome, you are dead. When you are\
      \ instead brought to the brink of death with a chance for recovery or redemption, roll +heart.\n\nOn a strong hit, you\
      \ are cast back into the mortal world.\n\nOn a weak hit, choose one.\n\n  * You die, but not before making a noble sacrifice.\
      \ Envision your final moments.\n  * There is more to be done. Envision what is revealed or asked of you at death's door,\
      \ and Swear an Iron Vow to complete an extreme quest. You return to the mortal world and must mark doomed. When you\
      \ complete the death-bound quest, clear the impact.\n\nOn a miss, you are dead."
    outcomes:
      strong_hit: You are cast back into the mortal world.
      weak_hit: Choose one — You die, but not before making a noble sacrifice (envision your final moments); or There is more
        to be done (Swear an Iron Vow for an extreme quest, return to the mortal world, and mark doomed — clear the impact
        when the quest is complete).
      miss: You are dead.
  - name: Face Desolation
    roll_type: action_roll
    trigger: When you are brought to the brink of desolation...
    text: "When you are brought to the brink of desolation, roll +heart.\n\nOn a strong hit, you resist and press on.\n\n\
      On a weak hit, choose one.\n\n  * Your spirit breaks, but not before you make a noble sacrifice. Envision your final\
      \ moments.\n  * You see a vision of a dreaded event coming to pass. Envision that dark future, and Swear an Iron Vow\
      \ to prevent it through an extreme quest. You return to your senses and must mark tormented. When you complete the soul-bound\
      \ quest, clear the impact.\n\nOn a miss, you succumb to despair or horror and are lost."
    outcomes:
      strong_hit: You resist and press on.
      weak_hit: Choose one — Your spirit breaks, but not before a noble sacrifice (envision your final moments); or You see
        a dark vision (Swear an Iron Vow for an extreme quest, return to your senses, mark tormented — clear the impact when
        the quest is complete).
      miss: You succumb to despair or horror and are lost.
  - name: Overcome Destruction
    roll_type: progress_roll
    trigger: When your command vehicle is destroyed or irrevocably lost...
    text: 'Progress Move — When your command vehicle is destroyed or irrevocably lost, you must discard the asset, along with
      any modules and docked support vehicles.


      If you survive, you may use your connections to replace some of what was lost. To learn the cost, roll the challenge
      dice and compare to the progress on your bonds legacy track.


      On a strong hit, you may call in a favor. This comes without conditions.


      On a weak hit, you owe someone. You must mark indebted and Swear an Iron Vow to complete an extreme quest in their service.
      When you complete the duty-bound quest, clear the impact.


      On a miss, as with the weak hit result, but this quest is against your nature, forces you to Forsake Your Vow on another
      quest, or is in the service of an enemy.


      If you accept the cost, take 1 experience for every marked ability on the discarded assets (minimum 3 experience). Spend
      this experience only on a new command vehicle, modules, and support vehicles.'
    outcomes:
      strong_hit: You may call in a favor to replace what was lost. This comes without conditions.
      weak_hit: You owe someone. Mark indebted and Swear an Iron Vow to complete an extreme quest in their service. Clear
        the impact when the quest is complete.
      miss: As with the weak hit result, but the quest is against your nature, forces you to Forsake Your Vow on another quest,
        or is in the service of an enemy.
- name: Recover Moves
  moves:
  - name: Sojourn
    roll_type: action_roll
    trigger: When you spend time recovering within a community...
    text: "When you spend time recovering within a community, roll +heart.\n\nOn a strong hit, this is a safe refuge. You\
      \ and your allies may each choose two recover moves: Heal, Hearten, Repair, or Resupply. Instead of rolling, assume\
      \ an automatic strong hit for each. An individual move can be taken more than once.\n\nOn a weak hit, as above, but\
      \ time is short or resources are strained. You and your allies each make one recover move instead of two, with no more\
      \ than three moves total among the group.\n\nOn a miss, choose one.\n\n  * The community needs your help, or makes a\
      \ costly demand in exchange for safe harbor. Envision what they ask of you. If you do it, or Swear an Iron Vow to see\
      \ it done, resolve this move as a strong hit.\n  * You find no relief, and the situation grows worse. Pay the Price."
    outcomes:
      strong_hit: This is a safe refuge. You and your allies may each choose two recover moves (Heal, Hearten, Repair, or
        Resupply) as automatic strong hits. An individual move can be taken more than once.
      weak_hit: As above, but time is short or resources are strained. You and your allies each make one recover move instead
        of two, with no more than three moves total among the group.
      miss: Choose one — The community demands help or makes a costly exchange (if you comply or Swear an Iron Vow, resolve
        as a strong hit); or You find no relief and the situation grows worse (Pay the Price).
  - name: Heal
    roll_type: action_roll
    trigger: When you receive medical care or provide treatment...
    text: "When you receive medical care or provide treatment, envision the situation and roll. If you...\n\n  * Receive treatment\
      \ from someone (not an ally): Roll +iron\n  * Mend your own wounds: Roll +iron or +wits, whichever is lower\n  * Obtain\
      \ treatment for a companion: Roll +heart\n  * Provide care: Roll +wits\n\nOn a strong hit, the care is helpful. If you\
      \ (or the ally under your care) are wounded, clear the impact and take or give +2 health. Otherwise, take or give +3\
      \ health.\n\nOn a weak hit, as above, but the recovery costs extra time or resources. Choose one: Lose Momentum (-2)\
      \ or Sacrifice Resources (-2).\n\nOn a miss, the aid is ineffective and the situation worsens. Pay the Price."
    outcomes:
      strong_hit: The care is helpful. If wounded, clear the impact and take or give +2 health. Otherwise, take or give +3
        health.
      weak_hit: As above, but the recovery costs extra time or resources. Choose one — Lose Momentum (-2) or Sacrifice Resources
        (-2).
      miss: The aid is ineffective and the situation worsens. Pay the Price.
  - name: Hearten
    roll_type: action_roll
    trigger: When you socialize, share intimacy, or find a moment of peace...
    text: 'When you socialize, share intimacy, or find a moment of peace, roll +heart.


      On a strong hit, you find companionship or comfort and your spirit is strengthened. If you are shaken, clear the impact
      and take +1 spirit. Otherwise, take +2 spirit. If you make this move as you Sojourn, take +1 more.


      On a weak hit, as above, but this indulgence is fleeting. Envision an interruption, complication, or inner conflict.
      Then, Lose Momentum (-1).


      On a miss, you take no comfort and the situation worsens. Pay the Price.'
    outcomes:
      strong_hit: You find companionship or comfort. If shaken, clear the impact and take +1 spirit. Otherwise, take +2 spirit.
        If made during Sojourn, take +1 more.
      weak_hit: As above, but this indulgence is fleeting. Envision an interruption, complication, or inner conflict. Then,
        Lose Momentum (-1).
      miss: You take no comfort and the situation worsens. Pay the Price.
  - name: Resupply
    roll_type: action_roll
    trigger: When you attempt to bolster your readiness...
    text: "When you attempt to bolster your readiness, envision the opportunity and your approach. If you...\n\n  * Barter\
      \ or make an appeal: Roll +heart\n  * Threaten or seize: Roll +iron\n  * Steal or swindle: Roll +shadow\n  * Scavenge\
      \ or craft: Roll +wits\n  * Gear up from your ship's stores: Roll +supply (hold)\n\nOn a strong hit, choose one.\n\n\
      \  * If you are unprepared, clear the impact and take +1 supply. Otherwise, take +2 supply.\n  * If you are in need\
      \ of a specific item, resource, or service that can reasonably be obtained, you acquire it. Take +1 momentum.\n\nOn\
      \ a weak hit, as above, but you must first deal with a cost, complication, or demand. Envision the nature of this obstacle.\n\
      \nOn a miss, you gain nothing and the situation worsens. Pay the Price."
    outcomes:
      strong_hit: Choose one — If unprepared, clear the impact and take +1 supply; otherwise take +2 supply. Or, if in need
        of a specific item or service, you acquire it and take +1 momentum.
      weak_hit: As above, but you must first deal with a cost, complication, or demand. Envision the nature of this obstacle.
      miss: You gain nothing and the situation worsens. Pay the Price.
  - name: Repair
    roll_type: action_roll
    trigger: When you make or obtain repairs to your vehicles, modules, mechanical companions, or other equipment...
    text: "When you make or obtain repairs to your vehicles, modules, mechanical companions, or other equipment, envision\
      \ the situation and roll. If you...\n\n  * Make your own repairs, or direct companions or crewmembers to make repairs:\
      \ Roll +wits\n  * Obtain repair services at a facility: Roll +heart\n\nOn a hit, you gain repair points as appropriate\
      \ to the situation.\n\nAt a facility: Strong hit = 7 points, Weak hit = 5 points\nAt anchor: Strong hit = 4 points,\
      \ Weak hit = 2 points\nUnderway: Strong hit = 3 points, Weak hit = 1 point\nUnder fire: Strong hit = 2 points, Weak\
      \ hit = 0 points\n\nAdditionally, if you make your own repairs, you may Sacrifice Resources (hold) and exchange each\
      \ -1 of supply for 1 extra repair point (up to 3 points).\n\nSpend repair points as follows. Unused points are discarded.\n\
      \n  * Clear the battered impact on a vehicle: 2 points\n  * Fix one broken module: 2 points\n  * Take +1 integrity on\
      \ a vehicle: 1 point\n  * Take +1 health for a mechanical companion: 1 point\n  * Repair any other component or device:\
      \ 3 points\n  * Repair any other equipment or device, but with a complication or malfunction: 2 points\n\nOn a miss,\
      \ the repairs are not made and the situation worsens. Pay the Price."
    outcomes:
      strong_hit: 'Gain repair points per situation — facility: 7, at anchor: 4, underway: 3, under fire: 2. Spend points
        to clear battered (2), fix broken module (2), +1 vehicle integrity (1), +1 companion health (1), other repair (3),
        or other with complication (2).'
      weak_hit: 'Gain repair points per situation — facility: 5, at anchor: 2, underway: 1, under fire: 0. Spend points as
        on a strong hit.'
      miss: The repairs are not made and the situation worsens. Pay the Price.
- name: Legacy Moves
  moves:
  - name: Earn Experience
    roll_type: no_roll
    trigger: When you fill a box on any legacy track...
    text: 'When you fill a box (four ticks) on any legacy track, take 2 experience. This experience may be spent when you
      Advance.


      Once you completely fill the tenth box on any legacy track, clear that track. You may start again marking progress on
      the cleared track, but earn experience at a reduced rate of 1 experience (instead of 2) for each filled progress box.
      If you make a progress roll against this track, resolve the outcome as if at 10 progress.'
  - name: Advance
    roll_type: no_roll
    trigger: When you develop your abilities, improve your resources, gain a reward, or boost your influence...
    text: "When you develop your abilities, improve your resources, gain a reward, or boost your influence, you may spend\
      \ 3 experience to add a new asset, or 2 experience to upgrade an asset. Choose from the following categories as appropriate\
      \ to your focus and opportunities.\n\n  * Module: Upgrade your command vehicle\n  * Support Vehicle: Acquire or improve\
      \ a secondary vehicle\n  * Path: Bolster your personal capabilities or follow a new calling\n  * Companion: Gain or\
      \ improve a trusted helper\n  * Deed: Learn from your experiences or build a legacy"
  - name: Continue a Legacy
    roll_type: progress_roll
    trigger: When you retire from your life as Ironsworn, or succumb to death or desolation...
    text: "Progress Move — When you retire from your life as Ironsworn, or succumb to death or desolation, you may create\
      \ a new character in your established setting. If you do, roll the challenge dice and compare to each of the former\
      \ character's legacy tracks: quests, bonds, and discoveries (one roll per track).\n\nFor each strong hit, choose one\
      \ from below, or one from the weak hit or miss options.\n\n  * Follow their path: Take one path or companion asset from\
      \ the former character (at no cost), including any marked abilities.\n  * Share a connection: Take one connection from\
      \ the former character, including any accrued progress or bond benefits.\n  * Accept an inheritance: Take the former\
      \ character's command vehicle and one module or support vehicle (at no cost), including any marked abilities.\n\nFor\
      \ each weak hit, choose one from below, or one from the miss options.\n\n  * See it through: Choose one of the former\
      \ character's unfinished quests, and Swear an Iron Vow (with an automatic strong hit) to see it done. You may immediately\
      \ mark up to half their earned progress (round down) on this quest.\n  * Rebuild a connection: Name one of the former\
      \ character's connections, and envision how time or circumstances have changed them in a dramatic way. When you Make\
      \ a Connection with them, take an automatic strong hit and mark two ticks on your bonds legacy track.\n  * Explore familiar\
      \ ground: Name a location that was meaningful to the former character. When you first visit that place, envision how\
      \ it has changed or is endangered. Then, mark two ticks on your discoveries legacy track.\n\nFor each miss, choose one.\n\
      \n  * Deal with the aftermath: Envision how one of your former character's foes has gained power or influence.\n  *\
      \ Switch loyalties: Envision how you begin in opposition to your former character's beliefs, goals, or allegiances.\n\
      \  * Open Pandora's Box: Envision how an advancement or discovery has unleashed unexpectedly dire consequences."
    outcomes:
      strong_hit: Choose one — Follow their path (take a path or companion asset at no cost); Share a connection (take a connection
        with accrued progress); or Accept an inheritance (take command vehicle and one module or support vehicle at no cost).
      weak_hit: Choose one — See it through (Swear an Iron Vow on an unfinished quest, auto strong hit, mark up to half prior
        progress); Rebuild a connection (auto strong hit on Make a Connection, +2 ticks on bonds); or Explore familiar ground
        (+2 ticks on discoveries when you first revisit).
      miss: Choose one — Deal with the aftermath (a foe gains power); Switch loyalties (begin in opposition to former character's
        beliefs); or Open Pandora's Box (an advancement unleashes dire consequences).
- name: Fate Moves
  moves:
  - name: Ask the Oracle
    roll_type: no_roll
    trigger: When you seek to resolve questions, reveal details, discover locations, determine how other characters respond,
      or trigger encounters or events...
    text: "When you seek to resolve questions, reveal details, discover locations, determine how other characters respond,\
      \ or trigger encounters or events, you may...\n\n  * Draw a conclusion: Decide the answer based on the most interesting\
      \ and obvious result.\n  * Spark an idea: Use an oracle table or other random prompt.\n  * Ask a yes/no question: Decide\
      \ the odds of a yes, and roll on the table below to check the answer.\n  * Pick two: Envision two options. Rate one\
      \ as likely, and roll on the table below to see if it is true. If not, it is the other.\n\nOn a match, envision an extreme\
      \ result or twist."
    tables:
    - name: Ask the Oracle
      rows:
      - min: 1
        max: 10
        text: YES — all odds levels (Small Chance or better)
      - min: 11
        max: 25
        text: YES — Unlikely / 50-50 / Likely / Almost Certain
      - min: 26
        max: 50
        text: YES — 50-50 / Likely / Almost Certain
      - min: 51
        max: 75
        text: YES — Likely / Almost Certain
      - min: 76
        max: 90
        text: YES — Almost Certain only
      - min: 91
        max: 100
        text: NO — all odds levels
