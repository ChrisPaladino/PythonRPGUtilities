source: Sundered Isles
assets:
- category: Deed
  name: Cohort
  requirement: Once you Make a Connection and accept them as a crewmate...
  abilities:
  - You gain a specialist. The specialist is part of your crew, but is tracked as a connection and provides benefits to you
    and your allies per their role. When you Withstand Damage and score a miss, or if you Pay the Price, you may suffer the
    cost by noting the specialist as out of action. An out of action specialist provides no benefit. To restore a specialist
    to duty, resolve the situation as appropriate to the nature of the injury, trauma, or dispute.
  - Gain additional specialists by spending 1 experience to add a connection to your crew as a specialist. Specialist bonuses
    may not be stacked for a single action.
  - When you Secure an Advantage by gathering your specialists to strategize or problem-solve, you may reroll one die for
    each participating specialist.
- category: Deed
  name: Damned
  requirement: Once you mark tormented or doomed...
  abilities:
  - You are cursed and remade by your encounter with death or desolation. Discard two or more assets connected to your former
    nature, and take up to three assets to represent your damned existence. Give the new assets a special mark. When you Advance
    and upgrade a damned asset, spend 1 experience (instead of 2).
  - Choose a community where you are accepted in spite of (or because of) your cursed nature. When you Sojourn there, reroll
    any dice.
  - When your curse is broken through the fulfillment of a vow or other event, activate this ability at no cost. Discard this
    asset and any of your damned assets, exchanging them one-for-one for new assets with an equal number of marked abilities.
    You may then improve one of your stats by +1.
- category: Deed
  name: Fleet Commander
  requirement: Once you fill 12 legacy track boxes and take command of a mighty fleet...
  abilities:
  - Your fleet has a starting and max power of 4. When you make a move as a fleetwide action to get in position, avoid a hazard,
    or fight, roll +power. If you Pay the Price and your fleet bears the cost, suffer -1 power. At 0 power, mark the fleet
    as wrecked. To refit the fleet, Sojourn and forgo an automatic strong hit on a recover move to take +2 power; if the fleet
    is wrecked, first spend 2 experience to clear that status.
  - Take +2 power and set your max power to 5.
  - When you Undertake an Expedition, you may reroll your action die if its value is less than your fleet's power.
- category: Deed
  name: Undead
  requirement: Once you die or are cursed with undeath...
  abilities:
  - This is not your end. Envision your undead form and nature. This asset counts as a permanent impact, but you are now resistant
    to mortal harm. When you Endure Harm, you may first Lose Momentum (-1, -2, or -3) to offset an equal amount of harm. If
    potential harm remains, and you choose to resist the harm, roll +spirit.
  - When you make a move using your undead aspect to intimidate, scare, or confound, reroll any dice; on a hit, take +2 momentum.
  - You may move at-will between the mortal world and the realm of the dead, can take others with you, and may navigate those
    paths to bypass or hasten a mortal journey. When you Undertake an Expedition within the realms of the dead, roll +spirit.
    On a strong hit, mark progress.
