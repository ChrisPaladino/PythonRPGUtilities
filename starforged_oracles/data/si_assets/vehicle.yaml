source: Sundered Isles
assets:
- category: Incidental Vehicle
  name: Sailing Ship
  abilities:
  - When you gain command of this ship, envision its nature and assign a max integrity (5, 4, or 3). If this is your
    primary ship, it has up to 5 hold. You and your allies use your hold value as supply when taking action or suffering
    a cost related to cargo and shipwide provisions.
- category: Command Vehicle
  name: Flagship
  abilities:
  - Your seagoing flagship is armed with cannons, transports crew, cargo, and passengers, and can equip support vehicle
    and module assets. In addition, it has up to 5 hold which acts as supply for you and your allies when taking action
    or suffering a cost related to shipwide gear and provisions.and can equip support vehicle and module assets. In
    addition, it has up to 5 hold which acts as supply for you and your allies when taking action or suffering a cost
    related to shipwide gear and provisions.
  - When you Finish an Expedition (dangerous or greater) on a seagoing journey and score a hit, this expedition
    strengthened your ties to your ship and crew. You and your allies may mark 1 tick on your bonds legacy track.
  - You fly a distinctive flag. Envision its design. Once per situation, when you hoist the colors in a dramatic moment,
    you and your allies take +1 momentum.