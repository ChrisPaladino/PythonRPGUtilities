source: Sundered Isles
assets:
- category: Path
  name: Automaton
  abilities:
  - You are a machine, and your health meter represents your integrity. You do not eat, drink, or breathe, and are
    immune to toxins and poisons. You otherwise Endure Harm as normal, but can only restore health when you Repair
    (spend 1 repair point to take +1 health).
  - You have a kinship with other machines. When you make a move to build, repair, or study a mechanical device, or
    question or convince a mechanical being, you may roll +spirit. On a match, you build new understanding or affinity;
    mark 1 tick on your bonds legacy track.
  - You may purchase paths (except Augmented) to reflect an aspect of your mechanical nature for 1 less experience.
    When you Pay the Price, you may suffer the cost by marking one of these assets as broken. Spend 2 repair points to
    return a broken asset to working condition.
- category: Path
  name: Cannoneer
  abilities:
  - When make a move by firing or directing the fire of a vehicle's weapons, and burn momentum to improve your result, roll
    your action die. On a 5 or 6, do not reset momentum. Otherwise, take +1 momentum after you reset.
  - When you Secure an Advantage or Gain Ground by preparing or loading special ammunition for a vehicle's weapons, roll +supply.
    On a hit, take +1 momentum. Then, when you first make a move to fire this ammunition, reroll any dice.
  - When you Strike using a vehicle's weapons, and hold your fire for maximum effect, decide the amount of momentum you risk
    (1, 2, or 3) and add +that amount. On a strong hit, mark progress. On a weak hit or miss, Lose Momentum equal to 1 + the
    amount risked (in addition to any other cost).
- category: Path
  name: Crew Commander
  abilities:
  - You have 2 command; your max is 4. When you or an ally make a move leading or aided by the crew, you may (after rolling)
    suffer -1 command to improve a miss to a weak hit, or a weak hit to a strong hit. When you Pay the Price, you may suffer
    the cost as -1 command. While at 0 command, this asset counts as an impact. To bolster your crew, provide a notable reward
    or respite, and roll +heart. On a strong hit, take +4 command. On a weak hit, take +2. On a miss, take +2 but envision
    a threat to your crew or leadership.
  - Take +2 command; your max is now 6.
  - When your command is 0 and the situation desperate, you may Compel your crew to action; if you do, take +2 command on
    a hit.
- category: Path
  name: Cutthroat
  requirement: If you wield knives...
  abilities:
  - When you Strike, add +1. When you make a move using a knife not as a weapon to attack or threaten, but as a tool to cut
    an object, gain leverage, or grab hold, add +1 and take +1 momentum on a hit.
  - Once per situation, when you make a move to ambush an unaware foe, or perform a feint or misdirection to draw someone
    off their guard, reroll any dice. If in a fight, mark progress on a hit. When you hold an ambushed foe at knifepoint and
    make a move aided by the prospect of violence, add +1.
  - When you End the Fight without mercy or restraint, you may reroll one challenge die. If you do, Endure Stress (-2). If
    you then choose to resist the stress, roll +iron instead of +spirit or +heart.
- category: Path
  name: Deck Clearer
  requirement: If you wield a scattergun...
  abilities:
  - Your scattergun is armed with a single shot, which you may use to Strike or Clash against a large target, a group of massed
    foes, or a close quarters enemy. When you do, reroll any dice. To use the scattergun more than once in the same fight,
    you must first score a hit as you Gain Ground (+edge), forgoing one of the choices awarded by that move to instead reload
    and ready your next shot.
  - When you make a move by firing your scattergun to damage or destroy an inanimate object, or to create a distraction, add
    +1 and take +1 momentum on a hit.
  - When you Take Decisive Action with a devastating shot or by demanding surrender at the point of a readied scattergun,
    you may reroll one challenge die.
- category: Path
  name: Duelist
  abilities:
  - When you Enter the Fray or Battle in a duel against a single notable foe, add +2. If you set a new objective in a fight
    by challenging a single worthy foe, take +2 momentum.
  - When you Gain Ground in personal combat using superficial attacks to probe your opponent's defenses, or by drawing them
    off guard with verbal repartee, take +1 momentum on a hit. On a strong hit, also add +1 if you immediately Strike.
  - When you roll a miss with a match in a situation where your reputation is known, you may suffer the cost by envisioning
    a notable rival who challenges you to a duel. If you defeat them, mark two ticks on your quests legacy track. If you decline,
    mark one tick on your bonds legacy track but envision the fallout of this refusal.
- category: Path
  name: Harpooner
  requirement: If you wield a handheld harpoon...
  abilities:
  - When you make a move to throw or stab your harpoon at a large target, add +1 and take +1 momentum on a hit. When making
    a move to attack person-sized foes, the harpoon is a powerful but ungainly weapon; add +2, but suffer -1 momentum on a
    weak hit or miss (in addition to any other cost of the outcome).
  - When you Strike a large foe in close quarters, you may drive your harpoon home. If you do, mark progress on a hit. If
    the fight continues, and you choose to pull the harpoon free, you must Gain Ground (+iron), score a hit, and forgo one
    of the choices awarded by that move.
  - When you Resupply by hunting large game, add +1 and take +1 supply on a hit. On a miss with a match, there's always a
    bigger fish; you draw the attention of a notable threat.
- category: Path
  name: Jinx
  abilities:
  - You are cursed by ill luck, but persisting offers its own rewards. If you score a miss with a match, this asset counts
    as an impact for you and your allies. You may undo this only by scoring a strong hit with a match; if you do, you and
    your allies each clear the impact and mark 1 tick on your bonds legacy track.
  - When you score a weak hit on a progress move, you may test your luck by reducing the progress score by 1 and rerolling
    all dice.
  - When you roll matched 1's on your challenge dice while suffering from this asset's impact, you may activate this ability
    at no cost. If you do, good fortune now favors you; you and your allies clear the impact and mark 2 ticks (instead of
    1) on your bonds legacy track. Then, discard this asset and permanently increase your momentum reset by 1.
- category: Path
  name: Merchant
  abilities:
  - "You have a ledger of goods. When you Resupply by obtaining a valuable commodity, do not take supply. Instead, envision\
    \ what you aquire and make note of it in your ledger. When you sell a commodity, roll +wits and clear it from your ledger.\
    \ On a hit, choose one. On a miss, the deal goes wrong; Pay the Price.\n\n  * Trade for provisions: On a strong hit, take\
    \ +3 supply; on a weak hit, take +2.\n  * Trade for coin or clout: On a strong hit, mark 2 ticks on your quests or bonds\
    \ legacy track, or 1 tick on each; on a weak hit, mark 1 tick on either."
  - As above, and add +1 when you make a sale.
  - When you Make a Connection with a fellow merchant or supplier, or if you Resupply by bartering with them, add +1 and take
    +1 momentum on a hit.
- category: Path
  name: Musician
  abilities:
  - When you Hearten, Secure an Advantage, or Gain Ground by encouraging yourself or others with a musical performance, add
    +1. On a strong hit with a match, also mark 1 tick on your bonds legacy track.
  - When you score a hit as you Sojourn during your first visit to a community, and Hearten by honoring them with a song,
    you may take an extra recovery move.
  - "When you suffer or encounter a tragic loss and perform a song to memorialize the dead, roll +heart. On a strong hit,\
    \ take both. On a weak hit, choose one. On a miss, the performance leaves you or others troubled; Pay the Price.\n\n \
    \ * Honor the lost: mark 2 ticks on your bonds legacy track.\n  * Offer comfort or inspiration: you and your allies take\
    \ +2 spirit or +2 momentum."
- category: Path
  name: Musketeer
  abilities:
  - When you make a move to shoot at a specific target from a distance, but score a miss, you set your sights on your quarry.
    The next time you make a move to shoot at the same target, add +2.
  - When you Clash, you may attempt to turn the tide of the fight with a difficult but bold shot. If you do, roll an extra
    challenge die and keep the two highest. A weak hit then counts as a strong hit. On a strong hit with a match, mark progress.
  - When you Gain Ground by charging into close quarters with a fixed bayonet, or if you React Under Fire by holding foes
    at bay or parrying close quarter attacks with your rifle, add +1 and take +1 momentum on a hit.
- category: Path
  name: Necromancer
  abilities:
  - While in the presence of the remains of an intelligent being, you may Gather Information by summoning their spirit to
    answer your questions. If you do, roll +heart and take +1 momentum on a hit.
  - When you Face Death, mark 2 ticks on your bonds legacy track. If an ally must Face Death, you may Aid Your Ally to guide
    them (before or after they roll); on a hit, they may reroll any dice.
  - You may Face Danger (+heart) to imbue a corpse with soulless life. On a hit, the corpse follows your commands. If it aids
    you through force, threat, or fear as you make a move, add +2 and fill one segment of a 4-segment clock. You may also
    suffer the cost of a move by filling a segment. When the clock is full, the corpse crumbles to ash.
- category: Path
  name: Overlander
  abilities:
  - When you Undertake an Expedition through uncharted or unfamiliar overland territory, you may reroll one challenge die.
  - When you find or make shelter in the wilds, roll +wits. On a strong hit, you and your allies envision how you pass the
    time and each take +2 spirit or +2 health, or +1 to each. In addition, any companions in your company take +1 health.
    On a weak hit, the comfort is fleeting; you and your allies take +1 health or +1 spirit. On a miss, you encounter hardship
    or a new danger; Pay the Price.
  - When you Resupply by searching out a source of food, water, or other natural resources in the wilds, add +1. On a strong
    hit with a match, you encounter an unusual or extraordinary location; you may Explore a Waypoint (even if not on an expedition)
    and reroll any dice.
- category: Path
  name: Pirate Captain
  abilities:
  - "When you seize a notable ship or treasure, roll +wits. On a strong hit, take both, or choose one twice. On a weak hit,\
    \ choose one. On a miss, choose one, but this prize also brings an unexpected danger; Pay the Price.\n  * Build your fortune:\
    \ Mark one tick on your quests legacy track.\n  * Share the spoils: Mark one tick on your bonds legacy track."
  - When you Set a Course for familiar hunting grounds or to intercept a specific target, you may reroll your action die if
    its value is less than your ship's integrity. When you Face Danger by stalking an area in search of prey, add +1 and take
    +1 momentum on a hit.
  - You may spend 1 experience to Sojourn with an automatic strong hit. If you do, you and your allies take one extra recovery
    move.
- category: Path
  name: Pistoleer
  abilities:
  - When you Enter the Fray with pistols in hand, or Battle by unleashing a whirlwind of gunfire, add +2.
  - When you Strike or Clash with a flurry of shots, you may roll your action die up to three times (or roll three action
    dice at once), keeping the highest. On a strong hit, mark progress. On a weak hit or miss, after resolving the outcome
    of the attack, immediately Check Your Gear to see if you have more pistols and ammo at the ready. If not, this asset is
    unusable for the remainder of the fight.
  - When you participate in a charged or antagonistic parlay with your pistols on display, take +2 momentum at the start of
    the interaction.
- category: Path
  name: Scholar
  abilities:
  - Choose a field of study to represent your scholarly expertise. When you Gather Information by conducting extended research
    within your field of study, or when you Hearten through the comfort of dedicated learning, add +1 and take +1 momentum
    on a hit. On a match, you piece together an enlightening or harrowing theory; envision the nature of this revelation and
    mark 1 tick on your discoveries legacy track.
  - When you Secure an Advantage or Gain Ground through cursory observation of a situation that falls within your field of
    study, or when you Compel using your expertise to speak truth or logic, add +1.
  - You apply yourself to another discipline. Choose a second field of study.
- category: Path
  name: Seadog
  abilities:
  - You are most suited to a life bound to wind and tide. When you set sail after an extended landlocked layover, take +2
    momentum or +2 spirit, or +1 of each. When you make landfall, Lose Momentum (-1).
  - When you Secure an Advantage to plot a course through careful study of currents and weather, or if you Face Danger aboard
    ship to overcome or avoid an environmental hazard such as a storm or rogue wave, add +1 and take +1 momentum on a hit.
  - When you make a move to hunt, oppose, study, pacify, or gain the favor of a creature of the sea, add +1. On a strong hit
    with a match, envision the surprising insight you gain into the nature of the creature or its environment; mark one tick
    on your discoveries legacy track.
- category: Path
  name: Shipwright
  abilities:
  - When you Repair, take 1 extra repair point or +1 momentum on a hit. When you Resupply by scavenging parts or materials
    from a ship or wreck, take +1 supply or +1 momentum on a strong hit.
  - When you Enter the Fray (+wits), you may study an enemy vessel to pointpoint weakneses and strengths in its construction
    or configuration. On a strong hit, you spot a vulnerability or devise a means of overcoming its advantages; envision what
    you learn and take +2 momentum. One time only, you or an ally may reroll any dice when using this insight to make a move.
  - When you Advance by conducting a refit at port, you may purchase or upgrade module assets for 1 less experience.
- category: Path
  name: Socialite
  abilities:
  - When you make a move using using charm, flattery, or seduction, or by navigating elite social circles, add +1.
  - "When you first make an appearance at a social event, you may attempt a grand or memorable entrace. If you do, roll +heart.\
    \ On a strong hit, mark one tick on your bonds legacy track and take +3 momentum. On a weak hit, take +2 momentum. On\
    \ a miss, choose one and Endure Stress (-2).\n\n  * You spot an unwelcome rival, authority, or former beau.\n  * You commit\
    \ an embarrassing faux pas.\n  * You are upstaged by another's entrance."
  - When you Hearten while attending an exclusive social event, reroll any dice. On a strong hit, you and any allies in your
    company take +1 momentum.
- category: Path
  name: Sorcerer
  abilities:
  - When you Secure an Advantage or Gain Ground by creating a minor mystical effect, roll +spirit. On a strong hit, take +1
    momentum. On a weak hit, take the standard benefits of the move, but first Endure Stress (-1). On a match, you learn something
    of magic's nature through an unexpected boon or harrowing backlash; mark 1 tick on your discoveries legacy track.
  - You may purchase assets of a supernatural nature for 1 experience (instead of 3).
  - When you Swear an Iron Vow (extreme or greater) to gather the components and lore of a complex and powerful ritual, reroll
    any dice. When you Reach a Milestone on this quest, take +2 momentum. When you enact the ritual to Fulfill Your Vow, you
    may reroll any challenge dice to draw on unknowable powers at the risk of your soul. If you do, Face Desolation.
- category: Path
  name: Spy
  abilities:
  - When you make a move to covertly observe a target, infiltrate a protected location, or uncover or decipher secret information,
    add +1 and take +1 momentum on a hit.
  - When you Face Danger or Secure an Advantage to establish a false identity or adopt a disguise, add +1. On a hit, add +1
    when using that identity to deceive or influence others. If you score a miss with a match when using a false identity,
    your deception is completely and dramatically undone.
  - "When you Forge a Bond for a relationship founded on deception, choose one.\n\n  * Keep the secret: You may reroll one\
    \ challenge die.\n  * Reveal the truth: On a strong hit, make the legacy reward one rank higher (1 extra box if already\
    \ epic)."
- category: Path
  name: Swashbuckler
  abilities:
  - When you make a move with outrageous style, and do not roll a 1 on your action die, you may reroll that die. If you burn
    momentum to improve your result on this move, roll your action die again; on a 5 or 6, do not reset momentum.
  - When you Enter the Fray in personal combat, or when an ongoing fight transitions to personal combat, you may envision
    up to three useful aspects of your surroundings. Take +1 momentum for each. Then, when you make a daring or unexpected
    move incorporating one of those aspects (once per aspect), add +1.
  - When you React Under Fire in close quarters by parrying, and score a strong hit, you counter or turn your foe's attack
    against them; mark progress.
- category: Path
  name: Urchin
  abilities:
  - You are unnoticed and underestimated. When you make a move to sneak, hide, or pilfer, add +1 and take +1 momentum on a
    hit. When you make a move to defy expectations (decide before rolling) add +1 and reroll any dice, but count a weak hit
    as a miss.
  - Name a connection as your mentor. When you Develop Your Relationship with them, take +2 momentum. When you successfully
    Fulfill Your Vow in their service or to their benefit, also mark two ticks on your bonds legacy track. When you Forge
    a Bond with them and score a hit, make the legacy reward one rank higher (1 extra box if already epic).
  - When you come of age or take on a role beyond your years, gain this ability at no cost. Then, discard this asset and take
    two others (at no cost) to represent your new status.
- category: Path
  name: Windbinder
  abilities:
  - When you bind the winds to your will, roll +edge. On a strong hit, the winds are fine; you and your allies take +2 momentum,
    and may add +1 when you make a move to navigate or maneuver. On a weak hit, the winds are fair; take +2 momentum. On a
    miss, the winds are foul; you and your allies Lose Momentum (-2), and should face weather-related hazards and costs as
    appropriate. No matter the outcome, set the winds to fair after a few hours.
  - As above, and add +1 when you bind the winds.
  - Once per situation, you may summon a mighty cyclone. Take an automatic miss as defined above, but also wreak havoc on
    your foes; mark progress on a related quest, or mark progress twice on related objectives in a fight.
