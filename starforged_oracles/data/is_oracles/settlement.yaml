- category: Settlement Oracles
  name: Settlement Name
  id: classic/oracles/settlement/name
  rows:
  - {min: 1, max: 15, text: "A feature of the landscape. Envision what it is. What makes it unusual or distinctive?"}
  - {min: 16, max: 30, text: "A manmade edifice. What is it? Why is it important to this settlement's history?,"}
  - {min: 31, max: 45, text: "A creature. Why have the people of this settlement chosen this creature as their totem? How is it represented in art or rituals?"}
