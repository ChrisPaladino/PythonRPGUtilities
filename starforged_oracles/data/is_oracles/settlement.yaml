  - {min: 61, max: 75, text: "A word in an Old World language. What culture is represented by this word? What does it translate to?"}
  - {min: 76, max: 90, text: "A season or environmental aspect. What influence does the weather have on this settlement?"}
  - {min: 91, max: 100, text: "Something Else..."}
