source: Starforged
assets:
- category: Deed
  name: Bonded
  requirement: One time only, once you Forge a Bond with a special individual...
  abilities:
  - This person is your bond-mate. When you Sojourn at their home, Hearten in their presence, or Test Your Relationship or
    Develop Your Relationship with them, reroll any dice. On a strong hit, take +1 momentum.
  - When you Set a Course back to your bond-mate's location, add +heart. On a strong hit with a match, envision a special
    reunion and mark two ticks on your bonds legacy track.
  - When you make a move in a crucial moment and score a miss, you may cling to thoughts of your bond-mate for support. If
    you do, reroll any dice. On another miss, in addition to the outcome of the move, you must mark shaken or traumatized.
    If both debilities are already marked, Face Desolation.
- category: Deed
  name: Homesteader
  requirement: Once you fill 4 boxes on your bonds legacy track...
  abilities:
  - You have chosen or established a community as your home. When you Swear an Iron Vow (formidable or greater) in service
    to your home, reroll any dice. On a hit, mark 1 tick on your bonds legacy track. When you Fulfill Your Vow and score a
    hit, also mark 2 ticks on your bonds legacy track.
  - "When you Sojourn in your home, choose one.\n\n  * Don't linger: Take an automatic weak hit\n  * Stay a bit: Add +1 and\
    \ take +1 momentum on a hit"
  - When you Set a Course for home, you may reroll your action die if its value is less than your spirit.
- category: Deed
  name: Marked
  requirement: Once you fill 5 boxes on your quests legacy track...
  abilities:
  - Envision the title, sigil, uniform, or tattoo you bear in recognition of your achievements. When you Compel or Make a
    Connection among those who would know your reputation, add +1. On a strong hit with a match, your notoriety grows; mark
    2 ticks on your bonds legacy track.
  - When you risk your reputation to overcome a miss, reroll any dice. If you score a miss again, fill one segment of a six-segment
    clock to represent the stain on your reputation. When the clock is filled, discard this asset.
  - Once per fight, when you Gain Ground through intimidation or command, reroll any dice and mark progress on a hit.
- category: Deed
  name: Oathbreaker
  requirement: Once you Forsake Your Vow...
  abilities:
  - This asset counts as an impact. One time only, when you Swear an Iron Vow (extreme or greater) to redeem yourself, give
    that vow a special mark. When you Reach a Milestone on the marked vow, take +2 momentum. If you Forsake Your Vow on the
    quest, discard this asset and retain the impact.
  - When you Secure an Advantage or Compel by reaffirming your commitment to your marked vow, add +1 and take +1 momentum
    on a hit.
  - When you Fulfill Your Vow on the marked quest and score a hit, you find redemption and automatically gain this ability
    at no cost. You may then improve one of your stats by +1 and discard this asset. Once the asset is discarded, you may
    not take it again.
- category: Deed
  name: Revenant
  requirement: Once you Face Death...
  abilities:
  - When you are at 0 health, and Endure Harm or Face Death, add +1. You may then reroll your action die if its value is less
    than your spirit.
  - When you Take Decisive Action by bringing death to a foe, you may burn momentum to zero out one (not both) of the challenge
    dice if your momentum is greater than the value of that die. If you do, Endure Stress (-2).
  - When you Gather Information by studying a place where death left its mark, you may roll +heart. If you do, take +1 momentum
    on a hit. On a strong hit with a match, you experience a detailed vision or insightful revelation of what occurred here;
    take +1 momentum more.
- category: Deed
  name: Survivor
  requirement: Once you mark traumatized or permanently harmed...
  abilities:
  - When you are haunted by past experiences and must Endure Stress, you may Lose Momentum (-1) before rolling as you attempt
    to find focus or calm. If you do, reroll any dice. On a strong hit, take +1 momentum.
  - When you make a move where a lasting effect (traumatized or permanently harmed) has a narrative impact on the scene or
    your approach, and burn momentum to improve your result, you may envision what sustains or motivates you in this moment.
    If you do, mark 1 tick on your quests or bonds legacy track. On a strong hit with a match, mark 2 ticks.
  - You are learning to live with this impact. The lasting effect (traumatized or permanently harmed, but not both) remains
    marked, but no longer reduces your max momentum or reset.
- category: Deed
  name: Vanguard
  requirement: Once you fill 6 boxes on your discoveries legacy track...
  abilities:
  - When you seek a safe location in a remote environment, make a progress roll against your discoveries legacy track. On
    a strong hit, you establish a haven; add +2 whenever you make a recovery move at that location. On a weak hit, as above,
    but add +1 when making a recovery move. On a miss, you are drawn into a bad situation and must Pay the Price. If you establish
    a haven but score a miss on a recovery move, that location is no longer safe.
  - When you make a move +wits and score a strong hit with a match, your hard-won experience lends insight; take +1 momentum.
  - When you Endure Stress, you may roll +wits. If you do, take +1 momentum on a hit.
