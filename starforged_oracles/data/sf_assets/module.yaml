source: Starforged
assets:
- category: Module
  name: Engine Upgrade
  abilities:
  - Your vehicle's finely-tuned engines speed your travels. When you Undertake an Expedition (+edge) and score a strong hit,
    take +1 momentum; on a strong hit with a 6 on your action die, take +2 momentum instead of +1.
  - "When you Enter the Fray, choose one (before rolling).\n\n  * Maneuver: Add +1 and take +1 momentum on a strong hit.\n\
    \  * Boost: Take +2 momentum on a hit."
  - When you make a desperate move to pursue a foe, escape a threat, or get in range, you may push your engines to their limit.
    If you do (decide after rolling), reroll any dice and count a weak hit as a strong hit. Then, Withstand Damage (-2).
- category: Module
  name: Expanded Hold
  abilities:
  - Your vehicle carries up to 3 cargo. When you gain +supply, you may convert it to +cargo. When you make a move +supply,
    you may add +cargo. When you Sacrifice Resources, you may instead suffer -cargo for any portion of the cost.
  - When you score a miss or weak hit as you make a move to barter or negotiate, and you have at least 1 cargo, you may sweeten
    the pot. If you do, reroll all dice and add +cargo. Then, suffer -1 cargo.
  - When you make a move to outrun a threat and have at least 1 cargo, you may first lighten your load by dropping cargo.
    If you do, suffer -cargo by the amount dropped, add +that amount, and take +2 momentum on a hit.
- category: Module
  name: Grappler
  abilities:
  - Your grappler can disrupt systems and snare machines and vehicles with a magnetic tether. When you take a minute or so
    to ready the grappler, roll +integrity or +wits. On a strong hit, the grappler is charged and may be fired. On a weak
    hit, charging requires extra time or focus; Lose Momentum (-1). On a miss, charging fails and you must Withstand Damage
    (-2). If you make a move to attack a foe or overcome an obstacle by firing the grappler, take an automatic strong hit.
  - If you score a strong hit when readying the grappler, you may Sacrifice Resources (-1) to overcharge the module. When
    you fire an overcharged grappler, take +2 momentum; if in a fight, also mark progress.
  - When you Take Decisive Action by firing the grappler, you may reroll one challenge die.
- category: Module
  name: Heavy Cannons
  abilities:
  - "When you aim your cannons and use them to Strike, choose one.\n\n  * Strafing run: Add +1 and take +1 momentum on a hit.\n\
    \  * Focus fire: Mark progress on a hit, but Lose Momentum (-1)."
  - Once per fight, when you Clash by committing to an all-or-nothing exchange of fire, add +1, count a weak hit as a strong
    hit, and mark progress on a hit. On a miss, you must suffer a dire outcome.
  - When you Compel, Enter the Fray, or Gain Ground by bringing your cannons to bear and sending a promise of violence to
    your foe over communication channels, add +1 and take +1 momentum on a hit. On a strong hit with a match, take another
    +1 momentum.
- category: Module
  name: Internal Refit
  abilities:
  - You have customized the cabins, common spaces, and environment of the ship to your needs. When you Undertake an Expedition
    (dangerous or greater), reroll any dice for the first leg of your journey. On a hit, you and your allies may envision
    how you make yourself at home; if you do, take +2 momentum or +1 spirit.
  - Your vessel is stocked with reserves. When you Sacrifice Resources and your supply is reduced to 0, first roll +integrity
    instead of marking unprepared. On a strong hit, take +1 supply. Otherwise, mark unprepared.
  - When you Enter the Fray to oppose an invader within your vessel, reroll any dice. On a strong hit, take +momentum equal
    to integrity. On a strong hit with a match, also mark progress.
- category: Module
  name: Medbay
  abilities:
  - When you use your medbay to Heal yourself or another patient, you may reroll your action die if its value is less than
    your vehicle's integrity.
  - When you or an ally mark the permanently harmed impact and are brought to the medbay without delay (less than an hour
    or so), you have a shot at making things right. If you Heal and score a strong hit, clear the impact (in addition to the
    other benefits of the move). Then, envision the scar that now serves as a reminder of the incident.
  - When you Face Danger by performing a risky medical procedure, or if you Gather Information through an autopsy or medical
    examination, reroll any dice and take +1 momentum on a hit.
- category: Module
  name: Missile Array
  abilities:
  - Your missile array is armed with 5 ammo. When you Strike or Clash with a missile attack, suffer -1 ammo and mark progress
    on a hit. If you Resupply in a place where your missiles can be replenished, you may exchange any earned +supply for +ammo.
  - When you have at least 1 ammo and Gain Ground by locking a missile on target, add +1 and take +1 momentum on a hit.
  - When you have at least 3 ammo and Take Decisive Action by unleashing all of your missiles, roll an action die before making
    the progress roll. If your action die is equal to or less than ammo, you may reroll any challenge dice. Then, set ammo
    to 0.
- category: Module
  name: Overseer
  abilities:
  - Your AI module keeps watch over the vehicle's systems and sensor data. When you Secure an Advantage or Gain Ground by
    talking through a situation with the overseer, you may roll +integrity. If you do, take +1 momentum on a hit.
  - When you Withstand Damage and roll on the miss table, the overseer will do what it can to help. Roll twice on the table
    and choose either result.
  - The overseer can pilot the vehicle independently. When you Face Danger by handing over control to the AI in an emergency,
    or to summon the vehicle remotely within a hazardous situation, you may roll +integrity. If you do, take +1 momentum on
    a hit.
- category: Module
  name: Reinforced Hull
  abilities:
  - Your vehicle is clad in iron. When you Withstand Damage, add +1. On a strong hit, take +1 momentum.
  - Your reinforced hull is given a fierce and distinctive color or design. When you arrive at a place where your reputation
    is a factor, take +1 momentum. When you Enter the Fray against a foe who knows your reputation, take +momentum equal to
    your vehicle's integrity on a strong hit.
  - When you React Under Fire by letting your reinforced hull take the hit, add +1 and take +1 momentum on a hit. On a strong
    hit with a match, take another +1 momentum as you surge through the chaos and put yourself in perfect position. On a miss,
    Pay the Price by marking this module as broken.
- category: Module
  name: Research Lab
  abilities:
  - When you use your lab to Secure an Advantage or Gather Information through careful analysis or experimentation, add +1
    and take +1 momentum on a hit.
  - When you Face Danger to isolate or secure a hazardous specimen, reroll any dice.
  - When you Swear an Iron Vow to undertake a long-term research project (extreme or greater), reroll any dice. When you obtain
    crucial samples, equipment, or data, mark progress on the quest and take +2 momentum. When you devote extended time to
    the project in your lab, Face Danger and add +1. On a hit, mark progress. On a strong hit with a match, mark progress
    twice. When you Fulfill Your Vow and score a hit, also mark one box on your discoveries legacy track.
- category: Module
  name: Sensor Array
  abilities:
  - Your advanced sensors scan the paths ahead to help spot dangers. When you Undertake an Expedition (+wits), you may reroll
    one challenge die.
  - "When you Secure an Advantage or Gather Information by scanning your vehicle's surroundings or analyzing a nearby object,\
    \ choose one and take +1 momentum on a hit.\n\n  * Manual scan: Add +1\n  * Automated scan: Instead of rolling the action\
    \ die, make it the value of your vehicle's integrity"
  - When you Enter the Fray against an ambush, or Face Danger to detect a hidden threat, you may roll +integrity. If you do,
    reroll any dice and take +1 momentum on a hit.
- category: Module
  name: Shields
  abilities:
  - When you raise your shields, roll +your vehicle's integrity or +wits. On a strong hit, set your shields to 4. On a weak
    hit, make them 3. On a miss, make them 2 but Lose Momentum (-1). Then, if you Withstand Damage, ignore damage up to the
    value of your shields and suffer -1 shields. Raised shields last for a few minutes. If reduced to 0, they cannot be raised
    again for an hour or so.
  - You may React Under Fire by letting your shields take the blow. If you do, roll +shields and take +2 momentum on a hit.
  - When you Enter the Fray and score a strong hit, you may raise your shields to 3 without rolling. If you do, take +1 momentum.
- category: Module
  name: Stealth Tech
  abilities:
  - Your vehicle is rigged for silent running. When you make a move against a specific foe or threat to avoid detection, add
    +1. If you Enter the Fray by ambushing an unaware foe, add +1 and mark progress on a strong hit.
  - When you travel stealthily as you Undertake an Expedition (+shadow), you may reroll your action die.
  - "When you are poised to Strike from hiding, you may roll +shadow. If you do, choose one (before rolling).\n\n  * Strike\
    \ true: Reroll any dice.\n  * Strike hard: Mark progress on a hit.\n\nOn a strong hit with a match, you also remain totally\
    \ undetected; take +2 momentum and add +1 on your next Strike."
- category: Module
  name: Vehicle Bay
  abilities:
  - You may purchase or upgrade a support vehicle for 1 less experience. When you Repair a battered support vehicle, spend
    1 repair point (instead of 2).
  - When a support vehicle is destroyed, and you are able to retrieve its wreckage, you may Ask the Oracle using the yes/no
    table if something can be salvaged from the mess. Make it 50/50. On a yes, spend 1 experience to restore the support vehicle
    asset with all previously marked abilities. Until you Repair and bring it back to full working order, the vehicle is battered
    with 0 integrity.
  - When you make a move to launch from or land on your command vehicle in a perilous situation or environment, reroll any
    dice and take +1 momentum on a hit.
- category: Module
  name: Workshop
  abilities:
  - When you Repair in the field, add +1.
  - When you make a move in your workshop to craft, modify, deactivate, or disassemble a device or machine, you may reroll
    your action die if its value is less than your vehicle's integrity.
  - When you Swear an Iron Vow to undertake a long-term engineering project (extreme or greater), reroll any dice. When you
    obtain a crucial part or resource, mark progress on the quest and take +2 momentum. When you devote extended time to the
    project in your workshop, Face Danger and add +1. On a hit, mark progress. On a strong hit with a match, mark progress
    twice. When you Fulfill Your Vow and score a hit, mark one extra box on your quests legacy track.
