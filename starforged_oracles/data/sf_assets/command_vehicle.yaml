source: Starforged
assets:
- category: Command Vehicle
  name: Starship
  abilities:
  - Your armed, multipurpose starship is suited for interstellar and atmospheric flight. It can comfortably transport several
    people, has space for cargo, and can carry and launch support vehicles. When you Advance, you may spend experience to
    equip this vehicle with module assets.
  - When you Finish an Expedition (dangerous or greater) in your starship and score a hit, this journey strengthened your
    ties to your ship and any fellow travelers. You and your allies may mark 1 tick on your bonds legacy track.
  - When you Withstand Damage, you may roll +heart. If you do, Endure Stress (-1) on a weak hit or miss.
