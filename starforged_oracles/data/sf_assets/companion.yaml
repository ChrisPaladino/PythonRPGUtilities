source: Starforged
assets:
- category: Companion
  name: Banshee
  abilities:
  - Your banshee companion accompanies you on planetside missions, using its echolocation to help guide the way. When you
    ride your banshee as you Undertake an Expedition or Set a Course, you may roll +its health.
  - When you make a move astride the banshee to detect a threat or avoid a fight, add +1 and take +1 momentum on a hit. On
    a strong hit with a match, you're gone in a flash; take another +1 momentum.
  - When you make a combat move and roll a 1 on your action die, the banshee senses the danger and emits a powerful scream
    to alert you or distract your foes. You may reroll that die.
- category: Companion
  name: Combat Bot
  abilities:
  - Your combat bot companion fights at your side. When you Strike aided by the bot, add +1; if you Clash, take +1 momentum
    on a hit.
  - When you use the threat of violence to Compel or Gain Ground while the bot brings its weapons to bear, you may roll +its
    health. If you do, take +1 momentum on a hit. On a strong hit with a match, the bot's display is especially persuasive;
    take another +1 momentum.
  - Once per fight, when you React Under Fire by using the bot to draw fire or create a diversion, roll +its health. On a
    strong hit, mark progress. On a weak hit, face the cost as normal, but then you are in control.
- category: Companion
  name: Glowcat
  abilities:
  - Your glowcat companion perceives the inner emotions and intentions of people and creatures in its vicinity, and embodies
    those impressions through the colors and intensity of its luminescent fur. When you Secure an Advantage by studying the
    glowcat's reactions in a charged interaction, add +its health.
  - When you Compel, the glowcat's reactions will help guide your approach; you may reroll your action die if its value is
    less than the glowcat's health.
  - When you Endure Stress in the company of the glowcat, add +1. On a strong hit with a match, take +momentum equal to their
    health.
- category: Companion
  name: Protocol Bot
  abilities:
  - Your protocol bot companion is programmed with knowledge of cultures, languages, and customs. When you are aided by the
    bot as you make a move in a formal social interaction, add +1. On a strong hit with a match, you learn something which
    builds understanding or empathy; also mark 1 tick on your bonds legacy track.
  - When you first visit or interact with a new community or culture, you may ask for the bot's insight. If you do, envision
    what you learn and take +1 momentum.
  - If you make a move in a charged interaction and the value of your action die is less than the bot's health, you may reroll
    it as the bot interjects with their commentary or advice.
- category: Companion
  name: Rockhorn
  abilities:
  - Your rockhorn companion uses its resilient, stone-like hide and brute strength to overcome threats. When you make a move
    by sending the rockhorn to directly attack a foe or smash an obstacle, roll +its health.
  - When you make the Companion Takes a Hit move for the rockhorn, count a weak hit as a strong hit. On a strong hit with
    a match, its rapid healing makes it unstoppable; give it another +1 health or take +1 momentum.
  - The rockhorn will come to your aid in your most vulnerable moments. When you Endure Harm or Endure Stress and score a
    miss, you may reroll your action die if its value is less than the rockhorn's health.
- category: Companion
  name: Sidekick
  abilities:
  - Your sidekick has a helpful expertise. When you make a move outside of a fight directly aided by their expertise, you
    may reroll your action die if its value is less than your sidekick's health. If you then score a strong hit with a match,
    mark 1 tick on your bonds legacy track.
  - When you Enter the Fray with the support of your sidekick, take +2 momentum on a hit. When you Clash together, add +1.
  - When your sidekick acts to get you out of a tough spot, you may Face Danger or React Under Fire and roll +their health
    (instead of your own stat). On a hit, take +1 momentum.
- category: Companion
  name: Sprite
  abilities:
  - Your sprite companion alters its delicate, crystalline form to fly, swim, or scurry, and can covertly navigate even the
    harshest of environments. When you make a move by sending it to perform trickery (such as creating a distraction, sneaking
    into a protected location, or stealing an object) add +its health.
  - You are attuned to the resonance of the sprite's crystalline structure, and can communicate with it at a distance and
    perceive through its senses. When you Secure an Advantage by observing a situation from its perspective, or remotely Gather
    Information, add +its health.
  - With a moment's rest, the sprite can mend its form and return automatically to max health.
- category: Companion
  name: Survey Bot
  abilities:
  - Your survey bot companion scans the path ahead. When you Undertake an Expedition (+wits) overland or within a site, add
    +1.
  - Once per expedition, when you Secure an Advantage by sending the bot to scout ahead, roll +its health. On a hit, also
    mark progress on the expedition. On a strong hit with a match, the bot uncovers an unexpected feature or location; envision
    what it reveals and mark 1 tick on your discoveries legacy track.
  - When you Explore a Waypoint aided by the bot's sensors, or Face Danger to detect a threat, roll +its health and take +1
    momentum on a hit.
- category: Companion
  name: Symbiote
  abilities:
  - You are physically bound to a being with 2 health. When you make aggressive moves while giving yourself to the symbiote's
    power, add +its health. If you face physical harm, choose either the Endure Harm or Companion Takes a Hit move. To restore
    the symbiote's health, you must Endure Stress and give the symbiote +health equal to the -spirit you face. If you make
    a move aided by the symbiote and roll a 1 on your action die, your fragile bond is broken for several hours.
  - When you make a move and heed the symbiote's guidance (decide after rolling), you may reroll any dice. Then, Endure Stress
    (-2).
  - The symbiote gains power and has 3 health.
- category: Companion
  name: Utility Bot
  abilities:
  - Your utility bot companion has helpful tools at-hand. When you make a move by directing it to access a system, cut through
    an obstacle, analyze a mechanical issue, or assemble or disassemble a device, roll +its health and take +1 momentum on
    a hit. On a strong hit with a match, it reveals an unexpected advantage or insight; take another +1 momentum.
  - When you Repair aided by the bot, add +1. On a miss, it reveals an alternative approach which will take extra time; you
    may reroll any dice, but first Lose Momentum (-2).
  - When you Check Your Gear to see if the bot has a specific tool or technique available, roll +its health and take +1 momentum
    on a hit.
- category: Companion
  name: Voidglider
  abilities:
  - Your voidglider companion cruises in your starship's energy wake and can help guide the way on spaceborne journeys. When
    you Undertake an Expedition, add +1.
  - The voidglider is harnessed and trained as a mount, and can be ridden for short-range spacebound transport. When you are
    riding the voidglider and make a move to detect or evade a threat by relying on its instincts, roll +its health.
  - When you make a move by signaling the voidglider to distract or attack a spaceborne foe, roll +its health and take +1
    momentum on a hit.
