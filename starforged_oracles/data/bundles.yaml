# bundles.yaml
# Oracle bundles – multi-table rolls that fire together.
#
# Each bundle item supports:
#   label:           Display name shown in results
#   oracle_id:       Exact runtime oracle_id (as built by the app's _walk_oracle_collection)
#   count:           How many times to roll this table (default 1)
#   cursed_oracle_id: Standalone cursed table to use when the cursed die fires (optional)
#   note:            Informational note shown beneath the label
#   cascade_from:    Label of a preceding roll whose text result drives oracle selection
#   cascade_map:     Mapping of size-result text → oracle_id (used with cascade_from)

bundles:

  - id: si_core_action_theme
    name: "Core: Action & Theme"
    game: "Sundered Isles"
    rolls:
      - label: "Action"
        oracle_id: "sundered_isles/oracles/core/action"
      - label: "Theme"
        oracle_id: "sundered_isles/oracles/core/theme"

  - id: si_core_descriptor_focus
    name: "Core: Descriptor & Focus"
    game: "Sundered Isles"
    rolls:
      - label: "Descriptor"
        oracle_id: "sundered_isles/oracles/core/descriptor"
      - label: "Focus"
        oracle_id: "sundered_isles/oracles/core/focus"

  - id: si_sailing_ship
    name: "Ship"
    game: "Sundered Isles"
    rolls:
      - label: "Ship Name"
        oracle_id: "sundered_isles/oracles/ship_names/ship_name"
        cursed_oracle_id: "sundered_isles/oracles/ship_names/cursed_ship_name"
      - label: "Size"
        oracle_id: "sundered_isles/oracles/sailing_ships/size"
      - label: "Position: Range"
        oracle_id: "sundered_isles/oracles/sailing_ships/position/range"
      - label: "Position: Status"
        oracle_id: "sundered_isles/oracles/sailing_ships/position/status"
      - label: "First Look"
        oracle_id: "sundered_isles/oracles/sailing_ships/first_look"
        count: 2
        cursed_oracle_id: "sundered_isles/oracles/sailing_ships/cursed_first_look"
      - label: "Controlling Faction"
        oracle_id: "sundered_isles/oracles/sailing_ships/controlling_faction/margins"
        note: "Sub-tables: Myriads / Margins / Reaches — roll on the table for your region"
      - label: "Symbol"
        oracle_id: "sundered_isles/oracles/sailing_ships/symbol"
        cursed_oracle_id: "sundered_isles/oracles/sailing_ships/cursed_symbol"
      - label: "Mission"
        cascade_from: "Size"
        cascade_map:
          Small: "sundered_isles/oracles/sailing_ships/mission/small"
          Medium: "sundered_isles/oracles/sailing_ships/mission/medium"
          Large: "sundered_isles/oracles/sailing_ships/mission/large"
          Colossal: "sundered_isles/oracles/sailing_ships/mission/huge"
          Flotilla: "sundered_isles/oracles/sailing_ships/mission/flotilla"
          Fleet: "sundered_isles/oracles/sailing_ships/mission/fleet"
          Armada: "sundered_isles/oracles/sailing_ships/mission/armada"
        cursed_oracle_id: "sundered_isles/oracles/sailing_ships/cursed_mission"
      - label: "Ship Details"
        oracle_id: "sundered_isles/oracles/sailing_ships/revaled_aspects"
        count: 2
        cursed_oracle_id: "sundered_isles/oracles/sailing_ships/cursed_aspects"
      - label: "Cargo"
        oracle_id: "sundered_isles/oracles/sailing_ships/cargo"
        count: 4
        cursed_oracle_id: "sundered_isles/oracles/sailing_ships/cursed_cargo"

  - id: si_settlement
    name: "Settlement"
    game: "Sundered Isles"
    rolls:
      - label: "Location"
        oracle_id: "sundered_isles/oracles/settlements/location"
      - label: "Settlement Name"
        oracle_id: "sundered_isles/oracles/settlement_names/settlement_name"
        cursed_oracle_id: "sundered_isles/oracles/settlement_names/cursed_settlement_name"
      - label: "Name Suffix (optional)"
        cascade_from: "Location"
        cascade_map:
          Shore: "sundered_isles/oracles/settlement_names/name_suffix_shore"
          Inland: "sundered_isles/oracles/settlement_names/name_suffix_inland"
          Waterside: "sundered_isles/oracles/settlement_names/name_suffix_waterside"
        note: "Optional — combine with Settlement Name result for a compound name (e.g. Moonstone Bay)"
      - label: "Size"
        oracle_id: "sundered_isles/oracles/settlements/size/margins"
        note: "Sub-tables: Myriads / Margins / Reaches — roll on the table for your region"
      - label: "Aesthetics"
        oracle_id: "sundered_isles/oracles/settlements/aesthetics"
        count: 2
      - label: "First Look"
        oracle_id: "sundered_isles/oracles/settlements/first_look"
        count: 2
        cursed_oracle_id: "sundered_isles/oracles/settlements/first_look_cursed"
      - label: "Controlling Faction"
        oracle_id: "sundered_isles/oracles/settlements/identity/controlling_faction/margins"
        note: "Sub-tables: Myriads / Margins / Reaches — roll on the table for your region"
      - label: "Disposition"
        oracle_id: "sundered_isles/oracles/settlements/identity/disposition"
      - label: "Authority"
        oracle_id: "sundered_isles/oracles/settlements/identity/authority"
      - label: "Focus"
        cascade_from: "Location"
        cascade_map:
          Shore: "sundered_isles/oracles/settlements/identity/focus/shore"
          Inland: "sundered_isles/oracles/settlements/identity/focus/inland"
          Waterside: "sundered_isles/oracles/settlements/identity/focus/waterside"
        count: 2
        cursed_oracle_id: "sundered_isles/oracles/settlements/cursed_focus"
      - label: "Details"
        oracle_id: "sundered_isles/oracles/settlements/details"
        count: 2
        cursed_oracle_id: "sundered_isles/oracles/settlements/details_cursed"
